<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASTELAB — Premium Gastronomy Lab</title>
    <!-- React, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root {
            --accent-light: #7e22ce; 
        }

        html { background-color: #f9fafb; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background-color: transparent;
            color: #111827;
        }

        /* ================= ФОНЫ ================= */
        
        .bg-container {
            position: fixed;
            inset: 0;
            background-color: #e5e7eb;
            background-image: url('bg-mobile.jpg');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            z-index: -1;
        }

        @media (min-width: 1024px) {
            .bg-container {
                background-image: url('bg-desktop.jpg');
                background-size: cover; 
                background-position: center;
            }
        }

        /* ================= ЭЛЕМЕНТЫ УПРАВЛЕНИЯ ================= */
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .text-glow { text-shadow: 0 10px 30px rgba(126, 34, 206, 0.15); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-light) 0%, #9333ea 100%);
            color: white;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 25px -5px rgba(126, 34, 206, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(126, 34, 206, 0.5);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; font-size: 0.875rem; transition: all 0.2s; font-weight: 600;}
        .calendar-day:hover:not(.empty) { background-color: rgba(126, 34, 206, 0.1); }
        .day-selected { background: var(--accent-light) !important; color: white !important; font-weight: bold; box-shadow: 0 4px 15px rgba(126, 34, 206, 0.4); }
        .day-in-range { background-color: rgba(126, 34, 206, 0.08); border-radius: 0; }
        .day-today { border: 1px solid var(--accent-light); color: var(--accent-light); }

        .modal-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-select { user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(126, 34, 206, 0.1); }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/hij5zlohk9jho';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHNaZVcGKnkCQmijqk2xGoc6Bn3tSNFwFUXUBDYGka0rHGDraOvOzfz3nu4zXOOAfbrhqrkJ9p-q5o/pub?gid=1091499446&single=true&output=csv';
        const FORMSPREE_ID = 'xqewzvbe'; 

        const parseCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const items = [];
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = (currentLine[0] || '').replace(/^"|"$/g, '').trim();
                let category = (currentLine[1] || '').replace(/^"|"$/g, '').trim();
                let title = (currentLine[2] || '').replace(/^"|"$/g, '').trim();
                const description = (currentLine[3] || '').replace(/^"|"$/g, '').trim();
                const image = (currentLine[4] || '').replace(/^"|"$/g, '').trim();
                
                if (image || category || title) {
                    items.push({ 
                        id: id || `item-${i}`, 
                        category: category || 'Прочее', 
                        title: title || '', 
                        description: description || '', 
                        image: image || '' 
                    });
                }
            }
            return items;
        };

        const DateRangePicker = ({ startDate, endDate, onChange }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                let firstDay = date.getDay() - 1;
                if (firstDay === -1) firstDay = 6;
                for (let i = 0; i < firstDay; i++) days.push(null);
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentMonth]);

            const handleDateClick = (date) => {
                if (!date) return;
                if (!startDate || (startDate && endDate)) {
                    onChange(date, null);
                } else if (date < startDate) {
                    onChange(date, null);
                } else {
                    onChange(startDate, date);
                }
            };

            const isSelected = (date) => {
                if (!date) return false;
                return (startDate && date.toDateString() === startDate.toDateString()) || 
                       (endDate && date.toDateString() === endDate.toDateString());
            };

            const isInRange = (date) => {
                if (!date || !startDate || !endDate) return false;
                return date > startDate && date < endDate;
            };

            return (
                <div className="glass-card rounded-[2.5rem] p-8 select-none">
                    <div className="flex justify-between items-center mb-6">
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() - 1)))} className="p-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition-colors">
                            <Icon name="chevron-left" />
                        </button>
                        <h4 className="font-black uppercase tracking-widest text-sm text-purple-700">
                            {months[currentMonth.getMonth()]} {currentMonth.getFullYear()}
                        </h4>
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() + 1)))} className="p-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition-colors">
                            <Icon name="chevron-right" />
                        </button>
                    </div>
                    <div className="calendar-grid mb-2">
                        {["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].map(d => (
                            <div key={d} className="text-[10px] font-black text-gray-400 text-center py-2 uppercase tracking-widest">{d}</div>
                        ))}
                    </div>
                    <div className="calendar-grid gap-1">
                        {daysInMonth.map((date, i) => {
                            const selected = isSelected(date);
                            const inRange = isInRange(date);
                            const start = startDate && date && date.toDateString() === startDate.toDateString();
                            const end = endDate && date && date.toDateString() === endDate.toDateString();
                            const isToday = date && date.toDateString() === new Date().toDateString();

                            return (
                                <div 
                                    key={i} 
                                    onClick={() => handleDateClick(date)}
                                    className={`calendar-day ${!date ? 'empty' : 'text-gray-800'} 
                                        ${selected ? 'day-selected' : ''} 
                                        ${inRange ? 'day-in-range' : ''}
                                        ${start && endDate ? 'rounded-r-none' : ''}
                                        ${end ? 'rounded-l-none' : ''}
                                        ${isToday ? 'day-today' : ''}
                                    `}
                                >
                                    {date ? date.getDate() : ""}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('welcome');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]);
            const [portfolioItems, setPortfolioItems] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dbError, setDbError] = useState(null); 
            const [formData, setFormData] = useState({ 
                fullName: '', city: '', contacts: '', concept: '', 
                dateFromObj: null, dateToObj: null, 
                menuLink: '', comment: '' 
            });
            const [dishCounts, setDishCounts] = useState({});

            const [showAdminAuth, setShowAdminAuth] = useState(false);
            const [adminPwd, setAdminPwd] = useState('');
            const [adminPwdError, setAdminPwdError] = useState(false);

            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            useEffect(() => {
                const loadFirebase = async () => {
                    try {
                        const importModule = new Function('url', 'return import(url)');
                        const [appMod, authMod, fsMod] = await Promise.all([
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js')
                        ]);
                        const firebaseConfig = {
                            apiKey: "AIzaSyCbsJUDJ4AMJBi_UOnX23n-T-vGq4O4mGs",
                            authDomain: "menubuild-c3fc6.firebaseapp.com",
                            projectId: "menubuild-c3fc6",
                            storageBucket: "menubuild-c3fc6.firebasestorage.app",
                            messagingSenderId: "1013946778157",
                            appId: "1:1013946778157:web:cd1225bfeb3426720aeea4"
                        };
                        const app = appMod.initializeApp(firebaseConfig);
                        const auth = authMod.getAuth(app);
                        const db = fsMod.getFirestore(app);
                        setFb({ auth, db, authMod, fsMod });
                    } catch (e) { 
                        console.error("Firebase load error", e); 
                        setDbError("Не удалось загрузить модули Firebase. Проверьте интернет-соединение.");
                        setIsLoadingData(false); 
                    }
                };
                loadFirebase();
            }, []);

            useEffect(() => {
                if (!fb) return;
                const { auth, authMod } = fb;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await authMod.signInWithCustomToken(auth, __initial_auth_token);
                            } catch (customTokenErr) {
                                await authMod.signInAnonymously(auth);
                            }
                        } else {
                            await authMod.signInAnonymously(auth);
                        }
                    } catch (e) { 
                        setDbError("Ошибка авторизации. Включите Anonymous в Firebase Console.");
                        setIsLoadingData(false);
                    }
                };
                initAuth();
                const unsub = authMod.onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [fb]);

            useEffect(() => {
                if (!fb || !user) return;
                const { db, fsMod } = fb;
                const portfolioRef = fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'portfolio');
                
                const unsub = fsMod.onSnapshot(portfolioRef, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setPortfolioItems(items);
                    
                    const allCats = new Set();
                    items.forEach(item => {
                        if (item.category) {
                            item.category.split(',').forEach(c => {
                                const trimmed = c.trim();
                                if (trimmed) allCats.add(trimmed);
                            });
                        }
                    });
                    setCategories([...allCats]);
                    setIsLoadingData(false);
                    setDbError(null); 
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                }, (error) => {
                    if (error.code === 'permission-denied') {
                        setDbError("Доступ к базе закрыт. Проверьте Rules в Firebase.");
                    } else {
                        setDbError(`Ошибка БД: ${error.message}`);
                    }
                    setIsLoadingData(false);
                });
                return () => unsub();
            }, [fb, user, appId]);

            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [activeTab, isLoadingData, mobileMenuOpen, dbError]);

            const navigateTo = (tab) => {
                setActiveTab(tab);
                setMobileMenuOpen(false);
                window.scrollTo(0, 0);
            };

            const resetApp = () => {
                setFormData({ fullName: '', city: '', contacts: '', concept: '', dateFromObj: null, dateToObj: null, menuLink: '', comment: '' });
                setDishCounts({});
                setSelectedItems([]);
                navigateTo('welcome');
            };

            if (isLoadingData) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-16 h-16 border-4 border-gray-200 border-t-purple-600 rounded-full animate-spin mb-6"></div>
                        <h2 className="text-xl font-black uppercase tracking-[0.5em] text-gray-400 animate-pulse">Tastelab</h2>
                    </div>
                );
            }

            if (dbError) {
                const projectId = "menubuild-c3fc6";
                const rulesLink = `https://console.firebase.google.com/project/${projectId}/firestore/rules`;
                return (
                    <div className="min-h-screen relative flex items-center justify-center p-6 text-gray-900">
                        <div className="bg-container"></div>
                        <div className="bg-overlay"></div>
                        <div className="glass-card max-w-2xl w-full p-8 lg:p-12 rounded-[2rem] text-center shadow-2xl relative z-10">
                            <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-200 text-red-500">
                                <Icon name="shield-alert" size={40} />
                            </div>
                            <h2 className="text-2xl font-black uppercase mb-4">Блокировка доступа</h2>
                            <p className="text-gray-600 mb-6">{dbError}</p>
                            <a href={rulesLink} target="_blank" className="btn-primary px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest inline-block mb-4">Настроить базу</a>
                            <br/>
                            <button onClick={() => window.location.reload()} className="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-gray-900">Обновить</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative text-gray-900">
                    <nav className="fixed w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 shadow-sm transition-colors">
                        <div className="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
                            <div className="text-3xl font-black tracking-tighter cursor-pointer group" onClick={() => navigateTo('welcome')}>
                                TASTE<span className="font-light text-gray-400 group-hover:text-gray-900 transition-colors">LAB</span>
                            </div>
                            <div className="hidden md:flex space-x-10 items-center">
                                <button onClick={() => navigateTo('welcome')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'welcome' ? 'text-gray-900' : 'text-gray-400'}`}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'portfolio' ? 'text-gray-900' : 'text-gray-400'}`}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="btn-primary px-8 py-3 rounded-full text-sm font-black uppercase tracking-widest flex items-center gap-3">
                                    Составить ТЗ {selectedItems.length > 0 && <span className="bg-white text-gray-900 px-2.5 py-0.5 rounded-full text-[10px]">{selectedItems.length}</span>}
                                </button>
                            </div>
                            <button className="md:hidden text-gray-600" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <Icon name={mobileMenuOpen ? "x" : "menu"} size={32} />
                            </button>
                        </div>
                        {mobileMenuOpen && (
                            <div className="md:hidden glass-card p-5 space-y-3 modal-fade-in mx-4 mt-2 rounded-[1.5rem]">
                                <button onClick={() => navigateTo('welcome')} className="block w-full text-left p-3 font-bold text-sm uppercase">О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className="block w-full text-left p-3 font-bold text-sm uppercase">Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="block w-full btn-primary text-center py-4 rounded-xl font-black text-sm uppercase">Составить ТЗ</button>
                            </div>
                        )}
                    </nav>

                    <main className="pt-32">
                        {activeTab === 'welcome' && <WelcomePage onNext={() => navigateTo('portfolio')} />}
                        {activeTab === 'portfolio' && <PortfolioPage items={portfolioItems} categories={categories} onNext={() => navigateTo('brief')} selectedItems={selectedItems} setSelectedItems={setSelectedItems} />}
                        {activeTab === 'admin' && <AdminPage fb={fb} appId={appId} portfolioItems={portfolioItems} />}
                        {activeTab === 'brief' && <BriefPage fb={fb} appId={appId} categories={categories} selectedItems={selectedItems} setSelectedItems={setSelectedItems} formData={formData} setFormData={setFormData} dishCounts={dishCounts} setDishCounts={setDishCounts} onReset={resetApp} onAddMore={() => navigateTo('portfolio')} />}
                    </main>

                    <button onClick={() => setShowAdminAuth(true)} className="fixed bottom-6 right-6 z-[100] p-3 rounded-full opacity-10 hover:opacity-100 hover:bg-white text-gray-500 hover:text-gray-900 hover:shadow-xl transition-all">
                        <Icon name="home" size={24} />
                    </button>

                    {showAdminAuth && (
                        <div className="fixed inset-0 z-[200] bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-4 modal-fade-in" onClick={() => setShowAdminAuth(false)}>
                            <div className="glass-card p-8 rounded-[2rem] w-full max-w-sm text-center relative border border-white/40 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowAdminAuth(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-900"><Icon name="x" size={20} /></button>
                                <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-600"><Icon name="lock" size={24} /></div>
                                <h3 className="font-black text-xl uppercase tracking-widest mb-6">Доступ закрыт</h3>
                                <input 
                                    type="password" autoFocus placeholder="ПАРОЛЬ" 
                                    className={`w-full bg-white/80 border ${adminPwdError ? 'border-red-500' : 'border-gray-200'} p-4 rounded-xl text-center font-black tracking-[0.5em] outline-none mb-4`}
                                    value={adminPwd} onChange={e => {setAdminPwd(e.target.value); setAdminPwdError(false);}}
                                    onKeyDown={e => {
                                        if(e.key === 'Enter') {
                                            if(adminPwd === 'Kursant2026') { setShowAdminAuth(false); setAdminPwd(''); navigateTo('admin'); } else { setAdminPwdError(true); }
                                        }
                                    }}
                                />
                                <button onClick={() => { if(adminPwd === 'Kursant2026') { setShowAdminAuth(false); setAdminPwd(''); navigateTo('admin'); } else { setAdminPwdError(true); } }} className="w-full btn-primary py-4 rounded-xl font-black text-sm uppercase tracking-widest">Войти</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const AdminPage = ({ fb, appId, portfolioItems }) => {
            const [adminTab, setAdminTab] = useState('portfolio');
            const [briefs, setBriefs] = useState([]);
            const [newItem, setNewItem] = useState({ category: '', title: '', description: '' });
            const [imageFile, setImageFile] = useState(null);
            const [imagePreview, setImagePreview] = useState("");
            const [statusMsg, setStatusMsg] = useState("");
            const [deletingId, setDeletingId] = useState(null);
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                if (!fb || adminTab !== 'briefs') return;
                const { db, fsMod } = fb;
                const unsub = fsMod.onSnapshot(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'briefs'), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setBriefs(items);
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                });
                return () => unsub();
            }, [fb, adminTab, appId]);

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            const maxDim = 800;
                            if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                            else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) { setImageFile(file); setImagePreview(URL.createObjectURL(file)); }
            };

            const handleEditClick = (item) => {
                setEditingId(item.id);
                setNewItem({ category: item.category || '', title: item.title || '', description: item.description || '' });
                setImagePreview(item.image);
                setImageFile(null);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNewItem({ category: '', title: '', description: '' });
                setImagePreview(""); setImageFile(null);
            };

            const handleAddOrEdit = async (e) => {
                e.preventDefault();
                if (!fb) return;
                if (!imageFile && !editingId) { setStatusMsg("Загрузи фото!"); return; }

                    <p className="text-lg lg:text-xl text-black font-bold uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,1)]">Проектируем гастрономические смыслы. <br className="hidden md:block"/> От идеи до идеальной подачи.</p>
                    <button onClick={onNext} className="btn-primary px-10 py-4 rounded-full text-base font-black uppercase tracking-widest flex items-center gap-3 mx-auto">Портфолио <Icon name="arrow-right" size={18} /></button>

            const filtered = useMemo(() => {

            const toggle = (i) => setSelectedItems(prev => prev.find(x => x.id === i.id) ? prev.filter(x => x.id !== i.id) : [...prev, i]);

        const BriefPage = ({ fb, appId, categories, selectedItems, setSelectedItems, formData, setFormData, dishCounts, setDishCounts, onReset, onAddMore }) => {
            const [submitted, setSubmitted] = useState(false);
            const [sending, setSending] = useState(false);
            const [warn, setWarn] = useState(false);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                const newItems = files.map((file, idx) => ({ id: `local-${Date.now()}-${idx}`, category: 'Свой файл', title: file.name, image: URL.createObjectURL(file) }));

            const send = async () => {
                if (!formData.dateFromObj || !formData.dateToObj) return;
                setSending(true);
                const itemsStr = Object.entries(dishCounts).filter(([_,v]) => v > 0).map(([c, v]) => `${c}: ${v}`).join(', ');
                const refsStr = selectedItems.map(i => i.title || 'Блюдо').join(', ');
                const finalData = {
                    "Дата": new Date().toLocaleString('ru-RU'),
                    "Имя": formData.fullName, "Город": formData.city, "Контакты": formData.contacts,
                    "Концепция": formData.concept, "Сроки (от)": formData.dateFromObj.toLocaleDateString('ru-RU'),
                    "Сроки (до)": formData.dateToObj.toLocaleDateString('ru-RU'), "Ссылка на материалы": formData.menuLink,
                    "Комментарий": formData.comment || '-', "Выбранные блюда": `Нужно: ${itemsStr || 'не указано'} | Референсы: ${refsStr || 'нет'}`
                };
                try {

                        fetch(SHEETDB_API_URL + '?sheet=ТЗ', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: finalData }) }),
                        fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }, body: JSON.stringify({ ...finalData }) })

                    await Promise.all(ps);
                    setSubmitted(true);
                } catch (e) { console.error(e); } finally { setSending(false); }
            };

                <div className="py-24 text-center max-w-xl mx-auto px-6 modal-fade-in">

                            </div>

                        </div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em]">02. Тайминг</h3>
                            <DateRangePicker startDate={formData.dateFromObj} endDate={formData.dateToObj} onChange={(start, end) => setFormData({...formData, dateFromObj: start, dateToObj: end})} />
                        </div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em]">03. Концепт</h3>
                            <textarea required placeholder="Опишите ваши идеи *" className={`${inputClass} h-32 resize-none`} value={formData.concept} onChange={e => setFormData({...formData, concept: e.target.value})} />
                            <input placeholder="Ссылка на материалы" className={inputClass} value={formData.menuLink} onChange={e => setFormData({...formData, menuLink: e.target.value})} />
                        </div>
                        <div className="space-y-4">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] ml-2">04. Объемы</h3>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                {categories.map(c => (
                                    <div key={c} className="glass-card p-4 rounded-xl border flex flex-col gap-3 group">
                                        <span className="text-[9px] font-black uppercase text-gray-400 truncate">{c}</span>
                                        <div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-lg">
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: Math.max(0, (dishCounts[c]||0)-1)})} className="w-7 h-7 bg-white rounded flex items-center justify-center shadow-sm"><Icon name="minus" size={12} /></button>
                                            <span className="font-black">{dishCounts[c]||0}</span>
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: (dishCounts[c]||0)+1})} className="w-7 h-7 bg-purple-600 text-white rounded flex items-center justify-center shadow-sm"><Icon name="plus" size={12} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <div className="flex justify-between items-center gap-4">
                                <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-purple-600">05. Референсы ({selectedItems.length})</h3>
                                <div className="flex gap-2">
                                    <label className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest cursor-pointer flex items-center gap-2">
                                        <Icon name="upload" size={12}/> Загрузить <input type="file" multiple accept="image/*" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                    <button type="button" onClick={onAddMore} className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest flex items-center gap-2">
                                        <Icon name="layout-grid" size={12}/> Из базы
                                    </button>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {selectedItems.map(item => (
                                    <div key={item.id} className="bg-white/80 border rounded-xl p-2.5 flex items-center gap-3">
                                        <img src={item.image} className="w-10 h-10 rounded-lg object-cover" />
                                        <p className="flex-1 text-xs font-black truncate uppercase tracking-tight">{item.title || 'Блюдо'}</p>
                                        <button type="button" onClick={() => setSelectedItems(prev => prev.filter(x => x.id !== item.id))} className="text-gray-400 hover:text-red-500"><Icon name="x" size={14} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button type="submit" disabled={sending} className="w-full btn-primary py-5 rounded-[1.5rem] font-black text-lg uppercase tracking-[0.3em] disabled:opacity-50 transition-all mt-2">
                            {sending ? 'Отправка...' : 'Отправить ТЗ'}
                        </button>
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
