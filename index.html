<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASTELAB — Создание ТЗ</title>
    <!-- Подключаем React, Babel и Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        [color-scheme="dark"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Иконки (используем SVG напрямую для надежности в HTML-файле)
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/hij5zlohk9jho';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHNaZVcGKnkCQmijqk2xGoc6Bn3tSNFwFUXUBDYGka0rHGDraOvOzfz3nu4zXOOAfbrhqrkJ9p-q5o/pub?gid=1091499446&single=true&output=csv';
        const ABOUT_CSV_URL = ''; 

        const parseCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const items = [];
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = (currentLine[0] || '').replace(/^"|"$/g, '').trim();
                const category = (currentLine[1] || '').replace(/^"|"$/g, '').trim();
                const title = (currentLine[2] || '').replace(/^"|"$/g, '').trim();
                const description = (currentLine[3] || '').replace(/^"|"$/g, '').trim();
                const image = (currentLine[4] || '').replace(/^"|"$/g, '').trim();
                if (category && title) {
                    items.push({ id: id || `item-${i}`, category, title, description, image });
                }
            }
            return items;
        };

        const parseAboutCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return null;
            const dataLine = lines[1].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return {
                title1: dataLine[0]?.replace(/^"|"$/g, '').trim(),
                title2: dataLine[1]?.replace(/^"|"$/g, '').trim(),
                description: dataLine[2]?.replace(/^"|"$/g, '').trim(),
                buttonText: dataLine[3]?.replace(/^"|"$/g, '').trim(),
                stat1Num: dataLine[4]?.replace(/^"|"$/g, '').trim(),
                stat1Text: dataLine[5]?.replace(/^"|"$/g, '').trim(),
                stat2Num: dataLine[6]?.replace(/^"|"$/g, '').trim(),
                stat2Text: dataLine[7]?.replace(/^"|"$/g, '').trim(),
                stat3Num: dataLine[8]?.replace(/^"|"$/g, '').trim(),
                stat3Text: dataLine[9]?.replace(/^"|"$/g, '').trim(),
                image: dataLine[10]?.replace(/^"|"$/g, '').trim(),
            };
        };

        function App() {
            const [activeTab, setActiveTab] = useState('welcome');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]);
            const [portfolioItems, setPortfolioItems] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [aboutData, setAboutData] = useState({});
            const [formData, setFormData] = useState({ fullName: '', city: '', contacts: '', concept: '', dateFrom: '', dateTo: '', menuLink: '' });
            const [dishCounts, setDishCounts] = useState({});

            useEffect(() => {
                const fetchData = async () => {
                    setIsLoadingData(true);
                    try {
                        const resPort = await fetch(CSV_URL);
                        if (resPort.ok) {
                            const csvText = await resPort.text();
                            const parsedItems = parseCSV(csvText);
                            if (parsedItems.length > 0) {
                                setPortfolioItems(parsedItems);
                                setCategories([...new Set(parsedItems.map(item => item.category))]);
                            }
                        }
                        if (ABOUT_CSV_URL) {
                            const resAbout = await fetch(ABOUT_CSV_URL);
                            if (resAbout.ok) {
                                const aboutText = await resAbout.text();
                                const parsedAbout = parseAboutCSV(aboutText);
                                if (parsedAbout) setAboutData(parsedAbout);
                            }
                        }
                    } catch (e) { console.error(e); }
                    finally { 
                        setIsLoadingData(false);
                        setTimeout(() => lucide.createIcons(), 100); 
                    }
                };
                fetchData();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, isLoadingData]);

            const navigateTo = (tab) => {
                setActiveTab(tab);
                setMobileMenuOpen(false);
                window.scrollTo(0, 0);
            };

            const resetApp = () => {
                setFormData({ fullName: '', city: '', contacts: '', concept: '', dateFrom: '', dateTo: '', menuLink: '' });
                setDishCounts({});
                setSelectedItems([]);
                navigateTo('welcome');
            };

            if (isLoadingData) {
                return (
                    <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <h2 className="text-xl font-bold tracking-widest uppercase">Tastelab</h2>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#0a0a0a]">
                    <nav className="fixed w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                            <div className="text-2xl font-black cursor-pointer" onClick={() => navigateTo('welcome')}>
                                TASTE<span className="text-purple-500">LAB</span>
                            </div>
                            <div className="hidden md:flex space-x-8 items-center">
                                <button onClick={() => navigateTo('welcome')} className={activeTab === 'welcome' ? 'text-purple-500' : 'text-gray-300 hover:text-white'}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={activeTab === 'portfolio' ? 'text-purple-500' : 'text-gray-300 hover:text-white'}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-full font-bold flex items-center gap-2">
                                    ТЗ {selectedItems.length > 0 && <span className="bg-white text-purple-600 px-2 rounded-full text-xs">{selectedItems.length}</span>}
                                </button>
                            </div>
                            <button className="md:hidden" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                <Icon name={mobileMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>
                    </nav>

                    <main className="pt-20">
                        {activeTab === 'welcome' && <WelcomePage onNext={() => navigateTo('portfolio')} data={aboutData} />}
                        {activeTab === 'portfolio' && <PortfolioPage items={portfolioItems} categories={categories} onNext={() => navigateTo('brief')} selectedItems={selectedItems} setSelectedItems={setSelectedItems} />}
                        {activeTab === 'brief' && <BriefPage categories={categories} selectedItems={selectedItems} setSelectedItems={setSelectedItems} formData={formData} setFormData={setFormData} dishCounts={dishCounts} setDishCounts={setDishCounts} onReset={resetApp} />}
                    </main>
                </div>
            );
        }

        const WelcomePage = ({ onNext, data }) => (
            <div className="max-w-7xl mx-auto px-4 py-20 lg:py-32 grid lg:grid-cols-2 gap-16 items-center">
                <div className="space-y-8">
                    <h1 className="text-5xl lg:text-7xl font-black leading-tight">
                        {data.title1 || 'Создаем'} <br/>
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-purple-600">
                            {data.title2 || 'хитовые меню'}
                        </span>
                    </h1>
                    <p className="text-xl text-gray-400 max-w-lg">{data.description || 'Разрабатываем прорывные гастрономические решения для вашего бизнеса.'}</p>
                    <button onClick={onNext} className="bg-white text-black px-10 py-4 rounded-full font-bold flex items-center gap-2 hover:bg-gray-200 transition-all">
                        {data.buttonText || 'Смотреть работы'} <Icon name="chevron-right" />
                    </button>
                    <div className="pt-12 grid grid-cols-3 gap-8 border-t border-white/10">
                        <div><div className="text-3xl font-black text-purple-500">{data.stat1Num || '100+'}</div><div className="text-xs text-gray-500 uppercase">{data.stat1Text || 'Проектов'}</div></div>
                        <div><div className="text-3xl font-black text-purple-500">{data.stat2Num || '6'}</div><div className="text-xs text-gray-500 uppercase">{data.stat2Text || 'Кухонь'}</div></div>
                        <div><div className="text-3xl font-black text-purple-500">{data.stat3Num || '14'}</div><div className="text-xs text-gray-500 uppercase">{data.stat3Text || 'Дней'}</div></div>
                    </div>
                </div>
                <div className="rounded-3xl overflow-hidden aspect-[4/5] relative border border-white/10 shadow-2xl">
                    <img src={data.image || 'https://images.unsplash.com/photo-1556155092-490a1ba16284?auto=format&fit=crop&q=80&w=1000'} className="w-full h-full object-cover" />
                </div>
            </div>
        );

        const PortfolioPage = ({ items, categories, onNext, selectedItems, setSelectedItems }) => {
            const [cat, setCat] = useState('Все');
            const filtered = cat === 'Все' ? items : items.filter(i => i.category === cat);
            const toggle = (i) => setSelectedItems(prev => prev.find(x => x.id === i.id) ? prev.filter(x => x.id !== i.id) : [...prev, i]);

            return (
                <div className="max-w-7xl mx-auto px-4 py-16">
                    <div className="text-center mb-12">
                        <h2 className="text-4xl font-black mb-4">Наши <span className="text-purple-500">работы</span></h2>
                        <div className="flex flex-wrap justify-center gap-2 mt-8">
                            {['Все', ...categories].map(c => (
                                <button key={c} onClick={() => setCat(c)} className={`px-6 py-2 rounded-full text-sm font-bold transition-all ${cat === c ? 'bg-white text-black' : 'bg-white/5 text-gray-400 hover:bg-white/10'}`}>{c}</button>
                            ))}
                        </div>
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filtered.map(i => (
                            <div key={i.id} className="group relative aspect-square rounded-3xl overflow-hidden border border-white/10">
                                <img src={i.image || 'https://images.unsplash.com/photo-1546069901-ba6e64c1ddf2?w=800'} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-all" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent flex flex-col justify-end p-6">
                                    <h3 className="font-bold text-xl">{i.title}</h3>
                                    <p className="text-sm text-gray-400 line-clamp-2 mt-1">{i.description}</p>
                                    <button onClick={() => toggle(i)} className={`mt-4 w-10 h-10 rounded-full flex items-center justify-center transition-all ${selectedItems.find(x => x.id === i.id) ? 'bg-purple-500' : 'bg-white/20 hover:bg-purple-500'}`}>
                                        <Icon name={selectedItems.find(x => x.id === i.id) ? 'check' : 'plus'} />
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="mt-20 text-center p-12 bg-white/5 rounded-3xl border border-white/10">
                        <h3 className="text-2xl font-bold mb-4">Готовы собрать свое ТЗ?</h3>
                        <button onClick={onNext} className="bg-purple-600 px-10 py-4 rounded-full font-bold">Перейти к анкете</button>
                    </div>
                </div>
            );
        };

        const BriefPage = ({ categories, selectedItems, setSelectedItems, formData, setFormData, dishCounts, setDishCounts, onReset }) => {
            const [submitted, setSubmitted] = useState(false);
            const [sending, setSending] = useState(false);
            const [warn, setWarn] = useState(false);

            const send = async () => {
                setSending(true);
                const itemsStr = Object.entries(dishCounts).map(([c, v]) => `${c}: ${v}`).join(', ');
                const refsStr = selectedItems.map(i => i.title).join(', ');
                
                try {
                    const res = await fetch(SHEETDB_API_URL + '?sheet=ТЗ', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: {
                            "Дата": new Date().toLocaleString(),
                            "Имя": formData.fullName,
                            "Город": formData.city,
                            "Контакты": formData.contacts,
                            "Концепция": formData.concept,
                            "Сроки (от)": formData.dateFrom,
                            "Сроки (до)": formData.dateTo,
                            "Ссылка на материалы": formData.menuLink,
                            "Выбранные блюда": `Нужно: ${itemsStr} | Референсы: ${refsStr}`
                        }})
                    });
                    if (res.ok) setSubmitted(true);
                } catch (e) { alert('Ошибка сети!'); }
                finally { setSending(false); }
            };

            if (submitted) return (
                <div className="py-40 text-center max-w-xl mx-auto px-4">
                    <Icon name="check-circle" size={80} className="mx-auto text-purple-500 mb-8" />
                    <h2 className="text-4xl font-black mb-4">Успешно!</h2>
                    <p className="text-gray-400 mb-10">ТЗ уже в таблице, скоро свяжемся.</p>
                    <button onClick={onReset} className="text-purple-400 font-bold uppercase tracking-widest hover:text-white">На главную</button>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto px-4 py-16 space-y-10">
                    <h2 className="text-4xl font-black mb-8">Заполнение <span className="text-purple-500">ТЗ</span></h2>
                    <form onSubmit={(e) => { e.preventDefault(); !formData.concept ? setWarn(true) : send(); }} className="space-y-8">
                        <div className="bg-white/5 p-8 rounded-3xl border border-white/10 space-y-6">
                            <div className="grid md:grid-cols-2 gap-6">
                                <input required placeholder="ФИО *" className="bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500" value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} />
                                <input required placeholder="Город *" className="bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500" value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} />
                            </div>
                            <input required placeholder="Контакты (Телефон / Почта) *" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none focus:border-purple-500" value={formData.contacts} onChange={e => setFormData({...formData, contacts: e.target.value})} />
                        </div>
                        <div className="bg-white/5 p-8 rounded-3xl border border-white/10 space-y-6">
                            <textarea placeholder="Опишите концепцию..." className="w-full bg-black/40 border border-white/10 p-4 rounded-xl h-32 outline-none focus:border-purple-500" value={formData.concept} onChange={e => setFormData({...formData, concept: e.target.value})} />
                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="space-y-2"><label className="text-xs text-gray-500 uppercase">Сроки (с)</label><input required type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl" value={formData.dateFrom} onChange={e => setFormData({...formData, dateFrom: e.target.value})} /></div>
                                <div className="space-y-2"><label className="text-xs text-gray-500 uppercase">Сроки (по)</label><input required type="date" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl" value={formData.dateTo} onChange={e => setFormData({...formData, dateTo: e.target.value})} /></div>
                            </div>
                        </div>
                        {categories.length > 0 && (
                            <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-4">
                                {categories.map(c => (
                                    <div key={c} className="bg-white/5 p-4 rounded-2xl border border-white/10 flex justify-between items-center">
                                        <span className="text-sm font-bold">{c}</span>
                                        <div className="flex items-center gap-3">
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: Math.max(0, (dishCounts[c]||0)-1)})} className="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center"><Icon name="minus" size={14} /></button>
                                            <span className="w-4 text-center">{dishCounts[c]||0}</span>
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: (dishCounts[c]||0)+1})} className="w-8 h-8 rounded-lg bg-purple-600 hover:bg-purple-500 flex items-center justify-center"><Icon name="plus" size={14} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        <div className="bg-purple-500/10 p-8 rounded-3xl border border-purple-500/30">
                            <h3 className="font-bold mb-4">Выбранные референсы ({selectedItems.length})</h3>
                            <div className="flex flex-wrap gap-2">
                                {selectedItems.map(i => (
                                    <div key={i.id} className="bg-purple-500 text-xs font-bold px-3 py-1 rounded-full flex items-center gap-2">
                                        {i.title} <button type="button" onClick={() => setSelectedItems(prev => prev.filter(x => x.id !== i.id))}><Icon name="x" size={12} /></button>
                                    </div>
                                ))}
                                {selectedItems.length === 0 && <p className="text-gray-500 text-sm">Ничего не выбрано</p>}
                            </div>
                        </div>
                        {warn && (
                            <div className="bg-yellow-500/20 p-6 rounded-2xl border border-yellow-500/40">
                                <p className="text-yellow-400 font-bold mb-4">Концепция не заполнена. Отправить как есть?</p>
                                <div className="flex gap-4">
                                    <button type="button" onClick={() => setWarn(false)} className="bg-white/10 px-6 py-2 rounded-xl text-sm font-bold">Ой, допишу</button>
                                    <button type="button" onClick={send} className="bg-yellow-500 text-black px-6 py-2 rounded-xl text-sm font-bold">Да, отправляй</button>
                                </div>
                            </div>
                        )}
                        {!warn && (
                            <button type="submit" disabled={sending} className="w-full bg-white text-black py-5 rounded-2xl font-black text-xl hover:bg-gray-200 disabled:bg-gray-700 transition-all">
                                {sending ? 'ОТПРАВКА...' : 'ОТПРАВИТЬ ТЗ'}
                            </button>
                        )}
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
