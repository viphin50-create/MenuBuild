<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASTELAB — Premium Gastronomy Lab</title>
    <!-- React, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root {
            --accent-light: #7e22ce; 
        }

        html { background-color: #f9fafb; }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            background-color: transparent;
            color: #111827;
        }

        /* ================= ФОНЫ ================= */
        
        /* Светлая тема (Мобилка по умолчанию) */
        .bg-container {
            position: fixed;
            inset: 0;
            background-color: #e5e7eb; /* Заглушка, пока не загрузишь свои фото */
            background-image: url('./bg-mobile.jpg'); /* <-- ФАЙЛ ДЛЯ ТЕЛЕФОНА */
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            z-index: -1;
        }

        /* Светлая тема (Горизонталка для ПК) */
        @media (min-width: 1024px) {
            .bg-container {
                background-image: url('./bg-desktop.jpg'); /* <-- ФАЙЛ ДЛЯ КОМПА */
                background-size: cover; 
                background-position: center;
            }
            .bg-overlay {
                background: rgba(255, 255, 255, 0.2);
            }
        }

        /* ================= ЭЛЕМЕНТЫ УПРАВЛЕНИЯ ================= */
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .text-glow { text-shadow: 0 10px 30px rgba(126, 34, 206, 0.15); }
        
        /* Стеклянные панели */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        /* Кнопка Primary */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-light) 0%, #9333ea 100%);
            color: white;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 25px -5px rgba(126, 34, 206, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(126, 34, 206, 0.5);
        }

        /* Кнопка Secondary */
        .btn-secondary {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.15);
        }

        /* Календарь */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; font-size: 0.875rem; transition: all 0.2s; font-weight: 600;}
        .calendar-day:hover:not(.empty) { background-color: rgba(126, 34, 206, 0.1); }
        .day-selected { background: var(--accent-light) !important; color: white !important; font-weight: bold; box-shadow: 0 4px 15px rgba(126, 34, 206, 0.4); }
        .day-in-range { background-color: rgba(126, 34, 206, 0.08); border-radius: 0; }
        .day-today { border: 1px solid var(--accent-light); color: var(--accent-light); }

        .modal-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-select { user-select: none; -webkit-user-select: none; }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

        input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(126, 34, 206, 0.1); }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/hij5zlohk9jho';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHNaZVcGKnkCQmijqk2xGoc6Bn3tSNFwFUXUBDYGka0rHGDraOvOzfz3nu4zXOOAfbrhqrkJ9p-q5o/pub?gid=1091499446&single=true&output=csv';
        const FORMSPREE_ID = 'xqewzvbe'; 

        const parseCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const items = [];
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = (currentLine[0] || '').replace(/^"|"$/g, '').trim();
                let category = (currentLine[1] || '').replace(/^"|"$/g, '').trim();
                let title = (currentLine[2] || '').replace(/^"|"$/g, '').trim();
                const description = (currentLine[3] || '').replace(/^"|"$/g, '').trim();
                const image = (currentLine[4] || '').replace(/^"|"$/g, '').trim();
                
                if (image || category || title) {
                    items.push({ 
                        id: id || `item-${i}`, 
                        category: category || 'Прочее', 
                        title: title || '', 
                        description: description || '', 
                        image: image || '' 
                    });
                }
            }
            return items;
        };

        const DateRangePicker = ({ startDate, endDate, onChange }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                let firstDay = date.getDay() - 1;
                if (firstDay === -1) firstDay = 6;
                for (let i = 0; i < firstDay; i++) days.push(null);
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            }, [currentMonth]);

            const handleDateClick = (date) => {
                if (!date) return;
                if (!startDate || (startDate && endDate)) {
                    onChange(date, null);
                } else if (date < startDate) {
                    onChange(date, null);
                } else {
                    onChange(startDate, date);
                }
            };

            const isSelected = (date) => {
                if (!date) return false;
                return (startDate && date.toDateString() === startDate.toDateString()) || 
                       (endDate && date.toDateString() === endDate.toDateString());
            };

            const isInRange = (date) => {
                if (!date || !startDate || !endDate) return false;
                return date > startDate && date < endDate;
            };

            return (
                <div className="glass-card rounded-[2.5rem] p-8 select-none">
                    <div className="flex justify-between items-center mb-6">
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() - 1)))} className="p-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition-colors">
                            <Icon name="chevron-left" />
                        </button>
                        <h4 className="font-black uppercase tracking-widest text-sm text-purple-700">
                            {months[currentMonth.getMonth()]} {currentMonth.getFullYear()}
                        </h4>
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() + 1)))} className="p-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition-colors">
                            <Icon name="chevron-right" />
                        </button>
                    </div>
                    <div className="calendar-grid mb-2">
                        {["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].map(d => (
                            <div key={d} className="text-[10px] font-black text-gray-400 text-center py-2 uppercase tracking-widest">{d}</div>
                        ))}
                    </div>
                    <div className="calendar-grid gap-1">
                        {daysInMonth.map((date, i) => {
                            const selected = isSelected(date);
                            const inRange = isInRange(date);
                            const start = startDate && date && date.toDateString() === startDate.toDateString();
                            const end = endDate && date && date.toDateString() === endDate.toDateString();
                            const isToday = date && date.toDateString() === new Date().toDateString();

                            return (
                                <div 
                                    key={i} 
                                    onClick={() => handleDateClick(date)}
                                    className={`calendar-day ${!date ? 'empty' : 'text-gray-800'} 
                                        ${selected ? 'day-selected' : ''} 
                                        ${inRange ? 'day-in-range' : ''}
                                        ${start && endDate ? 'rounded-r-none' : ''}
                                        ${end ? 'rounded-l-none' : ''}
                                        ${isToday ? 'day-today' : ''}
                                    `}
                                >
                                    {date ? date.getDate() : ""}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('welcome');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]);
            const [portfolioItems, setPortfolioItems] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dbError, setDbError] = useState(null); // Состояние для хранения текста ошибки БД
            const [formData, setFormData] = useState({ 
                fullName: '', city: '', contacts: '', concept: '', 
                dateFromObj: null, dateToObj: null, 
                menuLink: '', comment: '' 
            });
            const [dishCounts, setDishCounts] = useState({});

            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            useEffect(() => {
                const loadFirebase = async () => {
                    try {
                        const importModule = new Function('url', 'return import(url)');
                        const [appMod, authMod, fsMod] = await Promise.all([
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js')
                        ]);
                        const firebaseConfig = {
                            apiKey: "AIzaSyCbsJUDJ4AMJBi_UOnX23n-T-vGq4O4mGs",
                            authDomain: "menubuild-c3fc6.firebaseapp.com",
                            projectId: "menubuild-c3fc6",
                            storageBucket: "menubuild-c3fc6.firebasestorage.app",
                            messagingSenderId: "1013946778157",
                            appId: "1:1013946778157:web:cd1225bfeb3426720aeea4"
                        };
                        const app = appMod.initializeApp(firebaseConfig);
                        const auth = authMod.getAuth(app);
                        const db = fsMod.getFirestore(app);
                        setFb({ auth, db, authMod, fsMod });
                    } catch (e) { 
                        console.error("Firebase load error", e); 
                        setDbError("Не удалось загрузить модули Firebase. Проверьте интернет-соединение.");
                        setIsLoadingData(false); 
                    }
                };
                loadFirebase();
            }, []);

            useEffect(() => {
                if (!fb) return;
                const { auth, authMod } = fb;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await authMod.signInWithCustomToken(auth, __initial_auth_token);
                            } catch (customTokenErr) {
                                console.warn("Токен окружения не подошел к личной базе, переключаемся на анонимный вход...", customTokenErr);
                                await authMod.signInAnonymously(auth);
                            }
                        } else {
                            await authMod.signInAnonymously(auth);
                        }
                    } catch (e) { 
                        console.error("Auth error", e); 
                        setDbError("Ошибка авторизации. Убедитесь, что в Firebase Console -> Authentication -> Sign-in method включен способ входа 'Anonymous' (Анонимный).");
                        setIsLoadingData(false);
                    }
                };
                initAuth();
                const unsub = authMod.onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [fb]);

            useEffect(() => {
                if (!fb || !user) return;
                const { db, fsMod } = fb;
                const portfolioRef = fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'portfolio');
                
                const unsub = fsMod.onSnapshot(portfolioRef, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPortfolioItems(items);
                    
                    // Собираем уникальные категории, даже если они написаны через запятую
                    const allCats = new Set();
                    items.forEach(item => {
                        if (item.category) {
                            item.category.split(',').forEach(c => {
                                const trimmed = c.trim();
                                if (trimmed) allCats.add(trimmed);
                            });
                        }
                    });
                    setCategories([...allCats]);
                    
                    setIsLoadingData(false);
                    setDbError(null); // Очищаем ошибку если данные пришли
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                }, (error) => {
                    console.error("Firestore DB error:", error);
                    if (error.code === 'permission-denied' || (error.message && error.message.includes('permissions'))) {
                        setDbError("Доступ к базе данных Firebase закрыт (Missing Permissions). Зайдите в Firebase Console -> Firestore Database -> вкладка 'Rules' (Правила) и разрешите чтение/запись.");
                    } else {
                        setDbError(`Ошибка БД: ${error.message}`);
                    }
                    setIsLoadingData(false);
                });
                return () => unsub();
            }, [fb, user, appId]);

            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [activeTab, isLoadingData, mobileMenuOpen, dbError]);

            const navigateTo = (tab) => {
                setActiveTab(tab);
                setMobileMenuOpen(false);
                window.scrollTo(0, 0);
            };

            const resetApp = () => {
                setFormData({ fullName: '', city: '', contacts: '', concept: '', dateFromObj: null, dateToObj: null, menuLink: '', comment: '' });
                setDishCounts({});
                setSelectedItems([]);
                navigateTo('welcome');
            };

            // Экран загрузки
            if (isLoadingData) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-16 h-16 border-4 border-gray-200 border-t-purple-600 rounded-full animate-spin mb-6"></div>
                        <h2 className="text-xl font-black uppercase tracking-[0.5em] text-gray-400 animate-pulse">Tastelab</h2>
                    </div>
                );
            }

            // Экран критической ошибки БД
            if (dbError) {
                const projectId = fb?.auth?.app?.options?.projectId || "menubuild-c3fc6";
                const rulesLink = `https://console.firebase.google.com/project/${projectId}/firestore/rules`;

                return (
                    <div className="min-h-screen relative flex items-center justify-center p-6 text-gray-900">
                        <div className="bg-container"></div>
                        <div className="bg-overlay"></div>
                        <div className="glass-card max-w-2xl w-full p-8 lg:p-12 rounded-[2rem] text-center border-red-200/50 shadow-2xl relative z-10">
                            <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-200">
                                <Icon name="shield-alert" size={40} className="text-red-500" />
                            </div>
                            <h2 className="text-2xl lg:text-3xl font-black uppercase tracking-tighter mb-4">Блокировка доступа</h2>
                            <p className="text-gray-600 font-medium leading-relaxed mb-6">{dbError}</p>
                            
                            {dbError.includes('Missing Permissions') && (
                                <div className="text-left bg-gray-900 p-5 rounded-2xl shadow-inner mb-6 space-y-4">
                                    <div className="bg-red-500/10 border border-red-500/20 p-4 rounded-xl">
                                        <p className="text-red-400 text-sm font-bold mb-1">⚠️ Действие требуется от вас:</p>
                                        <p className="text-gray-300 text-xs mb-3">Код не может сам обойти эту блокировку. Вам нужно зайти в настройки базы и разрешить доступ.</p>
                                        <a href={rulesLink} target="_blank" className="bg-white text-gray-900 px-4 py-2 rounded-lg text-[10px] sm:text-xs font-black uppercase tracking-widest hover:bg-gray-200 transition-colors inline-block">Перейти в настройки базы &rarr;</a>
                                    </div>
                                    <div>
                                        <p className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2">Скопируйте этот код и вставьте там во вкладку Rules:</p>
                                        <code className="text-green-400 text-sm font-mono whitespace-pre overflow-x-auto block">
                                            rules_version = '2';<br/>
                                            service cloud.firestore {'{'}<br/>
                                            &nbsp;&nbsp;match /databases/&#123;database&#125;/documents {'{'}<br/>
                                            &nbsp;&nbsp;&nbsp;&nbsp;match /&#123;document=**&#125; {'{'}<br/>
                                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;allow read, write: if true;<br/>
                                            &nbsp;&nbsp;&nbsp;&nbsp;{'}'}<br/>
                                            &nbsp;&nbsp;{'}'}<br/>
                                            {'}'}
                                        </code>
                                    </div>
                                </div>
                            )}
                            <button onClick={() => window.location.reload()} className="btn-primary px-8 py-3 rounded-xl font-black text-sm uppercase tracking-widest active:scale-95">Перезагрузить страницу</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative text-gray-900">
                    <nav className="fixed w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 shadow-sm transition-colors">
                        <div className="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
                            <div className="text-3xl font-black tracking-tighter cursor-pointer group" onClick={() => navigateTo('welcome')}>
                                TASTE<span className="font-light text-gray-400 group-hover:text-gray-900 transition-colors">LAB</span>
                            </div>
                            <div className="hidden md:flex space-x-10 items-center">
                                <button onClick={() => navigateTo('welcome')} className={`text-sm font-bold uppercase tracking-widest transition-colors ${activeTab === 'welcome' ? 'text-gray-900' : 'text-gray-400 hover:text-gray-900'}`}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={`text-sm font-bold uppercase tracking-widest transition-colors ${activeTab === 'portfolio' ? 'text-gray-900' : 'text-gray-400 hover:text-gray-900'}`}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="btn-primary px-8 py-3 rounded-full text-sm font-black uppercase tracking-widest flex items-center gap-3 active:scale-95">
                                    Составить ТЗ {selectedItems.length > 0 && <span className="bg-white text-gray-900 px-2.5 py-0.5 rounded-full text-[10px]">{selectedItems.length}</span>}
                                </button>
                            </div>
                            <div className="flex items-center gap-4 md:hidden">
                                <button className="text-gray-600 p-2" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                    <Icon name={mobileMenuOpen ? "x" : "menu"} size={32} />
                                </button>
                            </div>
                        </div>
                        {mobileMenuOpen && (
                            <div className="md:hidden glass-card border-b border-gray-200 p-5 space-y-3 modal-fade-in mx-4 mt-2 rounded-[1.5rem]">
                                <button onClick={() => navigateTo('welcome')} className={`block w-full text-left p-3.5 rounded-xl font-bold text-sm uppercase tracking-widest ${activeTab === 'welcome' ? 'bg-gray-100 text-gray-900' : 'bg-transparent text-gray-500'}`}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={`block w-full text-left p-3.5 rounded-xl font-bold text-sm uppercase tracking-widest ${activeTab === 'portfolio' ? 'bg-gray-100 text-gray-900' : 'bg-transparent text-gray-500'}`}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="block w-full btn-primary text-center py-3.5 rounded-xl font-black text-sm uppercase tracking-widest shadow-xl">Составить ТЗ {selectedItems.length > 0 && `(${selectedItems.length})`}</button>
                            </div>
                        )}
                    </nav>

                    <main className="pt-32">
                        {activeTab === 'welcome' && <WelcomePage onNext={() => navigateTo('portfolio')} />}
                        {activeTab === 'portfolio' && <PortfolioPage items={portfolioItems} categories={categories} onNext={() => navigateTo('brief')} selectedItems={selectedItems} setSelectedItems={setSelectedItems} />}
                        {activeTab === 'admin' && <AdminPage fb={fb} appId={appId} portfolioItems={portfolioItems} />}
                        {activeTab === 'brief' && <BriefPage categories={categories} selectedItems={selectedItems} setSelectedItems={setSelectedItems} formData={formData} setFormData={setFormData} dishCounts={dishCounts} setDishCounts={setDishCounts} onReset={resetApp} onAddMore={() => navigateTo('portfolio')} />}
                    </main>

                    {/* Секретный вход в админку */}
                    <button 
                        onClick={() => navigateTo('admin')} 
                        className="fixed bottom-6 right-6 z-[100] p-3 rounded-full opacity-10 hover:opacity-100 hover:bg-white text-gray-500 hover:text-gray-900 hover:shadow-xl transition-all duration-300"
                        title="Управление"
                    >
                        <Icon name="home" size={24} />
                    </button>
                </div>
            );
        }

        const AdminPage = ({ fb, appId, portfolioItems }) => {
            const [newItem, setNewItem] = useState({ category: '', title: '', description: '' });
            const [imageFile, setImageFile] = useState(null);
            const [imagePreview, setImagePreview] = useState("");
            const [statusMsg, setStatusMsg] = useState("");
            const [deletingId, setDeletingId] = useState(null);

            // Умный сжиматель фоток перед отправкой в базу
            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const maxDim = 800; // Оптимальный размер для веба, чтобы база не лопнула
                            
                            if (width > height && width > maxDim) {
                                height *= maxDim / width;
                                width = maxDim;
                            } else if (height > maxDim) {
                                width *= maxDim / height;
                                height = maxDim;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            // Возвращаем облегченный код картинки
                            resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);

            );

            return (
                <div className="max-w-4xl mx-auto px-6 py-8 space-y-12 pb-24">
                    <div className="text-center">
                        <h2 className="text-4xl lg:text-6xl font-black uppercase tracking-tighter mb-3 text-glow text-gray-900">БРИФИНГ</h2>
                        <p className="text-gray-400 font-bold uppercase text-[10px] tracking-[0.4em]">Шаг 3: Сборка технического задания</p>
                    </div>

                    <form onSubmit={(e) => { e.preventDefault(); !formData.concept ? setWarn(true) : send(); }} className="space-y-8">
                        
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] flex items-center gap-3">
                                <div className="w-6 h-1px bg-purple-200"></div> 01. Контакты
                            </h3>
                            <div className="grid md:grid-cols-2 gap-5">
                                <div className="space-y-1.5">
                                    <label className="text-[9px] text-gray-500 uppercase font-black ml-1 tracking-widest">ФИО или Название компании *</label>
                                    <input required placeholder="Иван Иванов" className={inputClass} value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} />
                                </div>
                                <div className="space-y-1.5">
                                    <label className="text-[9px] text-gray-500 uppercase font-black ml-1 tracking-widest">Город реализации *</label>
                                    <input required placeholder="Москва" className={inputClass} value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} />
                                </div>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-[9px] text-gray-500 uppercase font-black ml-1 tracking-widest">Способ связи (Telegram / WA) *</label>
                                <input required placeholder="@username / +7..." className={inputClass} value={formData.contacts} onChange={e => setFormData({...formData, contacts: e.target.value})} />
                            </div>
                        </div>

                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] flex items-center gap-3">
                                <div className="w-6 h-1px bg-purple-200"></div> 02. Тайминг
                            </h3>
                            <div className="grid md:grid-cols-2 gap-8 items-center">
                                <div className="space-y-4">
                                    <p className="text-gray-500 font-medium leading-relaxed uppercase text-[10px] tracking-wider">Определите окно разработки. Мы работаем итерациями по 7 дней.</p>
                                    <div className="bg-white/60 p-4 rounded-xl border border-gray-200 space-y-2.5">
                                        <div className="flex justify-between text-[9px] uppercase font-black">
                                            <span className="text-gray-400">СТАРТ</span>
                                            <span className={formData.dateFromObj ? 'text-purple-600' : 'text-gray-300'}>{formData.dateFromObj ? formData.dateFromObj.toLocaleDateString('ru-RU') : 'ОЖИДАНИЕ'}</span>
                                        </div>
                                        <div className="flex justify-between text-[9px] uppercase font-black border-t border-gray-100 pt-2.5">
                                            <span className="text-gray-400">ФИНИШ</span>
                                            <span className={formData.dateToObj ? 'text-purple-600' : 'text-gray-300'}>{formData.dateToObj ? formData.dateToObj.toLocaleDateString('ru-RU') : 'ОЖИДАНИЕ'}</span>
                                        </div>
                                    </div>
                                </div>
                                <DateRangePicker 
                                    startDate={formData.dateFromObj} 
                                    endDate={formData.dateToObj} 
                                    onChange={(start, end) => setFormData({...formData, dateFromObj: start, dateToObj: end})}
                                />
                            </div>
                        </div>

                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] flex items-center gap-3">
                                    <div className="w-6 h-1px bg-purple-200"></div> 03. Концепт
                                </h3>
                            </div>
                            
                            <div>
                                <textarea 
                                    placeholder="Опишите ваши идеи, направление кухни, целевую аудиторию..." 
                                    className={`${inputClass} h-32 resize-none`} 
                                    value={formData.concept} 
                                    onChange={e => setFormData({...formData, concept: e.target.value})} 
                                />
                            </div>

                            <div className="flex items-center gap-3 bg-white/60 p-1.5 rounded-xl border border-gray-200 focus-within:border-purple-400 transition-colors">
                                <div className="p-2 bg-purple-100 text-purple-600 rounded-lg"><Icon name="link" size={16} /></div>
                                <input placeholder="Ссылка на папку с материалами" className="bg-transparent border-none outline-none w-full font-medium text-gray-900 placeholder:text-gray-400 text-xs" value={formData.menuLink} onChange={e => setFormData({...formData, menuLink: e.target.value})} />
                            </div>
                        </div>

                        <div className="space-y-4">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] ml-2 flex items-center gap-3">
                                <div className="w-6 h-1px bg-purple-200"></div> 04. Объемы
                            </h3>
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                {categories.map(c => (
                                    <div key={c} className="glass-card p-4 rounded-xl border border-gray-200 flex flex-col gap-3 group hover:border-purple-300 transition-all shadow-sm">
                                        <span className="text-[9px] font-black uppercase text-gray-400 tracking-widest group-hover:text-purple-600">{c}</span>
                                        <div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-lg border border-gray-100">
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: Math.max(0, (dishCounts[c]||0)-1)})} className="w-7 h-7 rounded-md bg-white shadow-sm hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors"><Icon name="minus" size={12} /></button>
                                            <span className="font-black text-base text-gray-900">{dishCounts[c]||0}</span>
                                            <button type="button" onClick={() => setDishCounts({...dishCounts, [c]: (dishCounts[c]||0)+1})} className="w-7 h-7 rounded-md bg-purple-600 text-white hover:bg-purple-700 flex items-center justify-center shadow-sm transition-colors"><Icon name="plus" size={12} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <h3 className="text-[10px] font-black uppercase tracking-[0.4em] text-purple-600">05. Референсы ({selectedItems.length})</h3>
                                <div className="flex flex-wrap gap-2">
                                    <label className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest flex items-center gap-2 active:scale-95 cursor-pointer">
                                        <Icon name="upload" size={12} className="text-purple-600"/> С устройства
                                        <input type="file" multiple accept="image/*" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                    <button type="button" onClick={onAddMore} className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest flex items-center gap-2 active:scale-95">
                                        <Icon name="layout-grid" size={12} className="text-purple-600"/> Из базы
                                    </button>
                                </div>
                            </div>
                            {selectedItems.length > 0 ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {selectedItems.map(item => (
                                        <div key={item.id} className="bg-white/80 border border-gray-200 rounded-xl p-2.5 flex items-center gap-3 group shadow-sm hover:shadow-md transition-shadow">
                                            <img src={item.image || 'https://images.unsplash.com/photo-1546069901-ba6e64c1ddf2?w=200'} className="w-12 h-12 rounded-lg object-cover transition-all" />
                                            <div className="flex-1 min-w-0">
                                                <p className="text-[8px] text-purple-500 font-black uppercase tracking-widest mb-0.5 truncate">{item.category || 'Без категории'}</p>
                                                <p className="text-xs font-black truncate uppercase tracking-tight text-gray-900">{item.title || 'Без названия'}</p>
                                            </div>
                                            <button type="button" onClick={() => setSelectedItems(prev => prev.filter(x => x.id !== item.id))} className="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-red-50 hover:text-red-500 transition-all"><Icon name="x" size={14} /></button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-12 border-2 border-dashed border-gray-300 rounded-[1.5rem] bg-gray-50/50">
                                    <p className="text-gray-400 text-[10px] font-black uppercase tracking-[0.2em]">Пусто. Вернитесь в портфолио за примерами.</p>
                                </div>
                            )}
                        </div>

                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <h3 className="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em] flex items-center gap-3"><Icon name="message-square" size={14}/> Комментарий</h3>
                            <textarea placeholder="Любые мысли, пожелания или важные уточнения..." className={`${inputClass} h-24 resize-none`} value={formData.comment} onChange={e => setFormData({...formData, comment: e.target.value})} />
                        </div>

                        {warn ? (
                            <div className="bg-orange-50 p-6 rounded-[1.5rem] border border-orange-200 text-center animate-pulse shadow-sm">
                                <p className="text-orange-600 font-black mb-4 uppercase tracking-widest text-[10px]">Концепция не заполнена! <br className="sm:hidden"/> Без нее будет сложно начать.</p>
                                <div className="flex flex-col sm:flex-row justify-center gap-2 max-w-xs mx-auto">
                                    <button type="button" onClick={() => setWarn(false)} className="btn-secondary flex-1 py-2.5 rounded-lg text-[9px] font-black uppercase tracking-widest">Дописать</button>
                                    <button type="button" onClick={send} className="bg-orange-500 text-white flex-1 py-2.5 rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-orange-600 shadow-md">Отправить так</button>
                                </div>
                            </div>
                        ) : (
                            <button type="submit" disabled={sending} className="group relative w-full btn-primary py-5 rounded-[1.5rem] font-black text-lg uppercase tracking-[0.3em] active:scale-[0.98] disabled:opacity-50 transition-all overflow-hidden mt-2">
                                <div className="relative z-10">{sending ? 'Отправка...' : 'Отправить ТЗ в работу'}</div>
                            </button>
                        )}
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
