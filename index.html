<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASTELAB — Premium Gastronomy Lab</title>
    
    <!-- Настройки для iOS (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TasteLab">
    
    <!-- Иконка для рабочего стола -->
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/initials/svg?seed=TL&backgroundColor=7e22ce&fontSize=50&fontWeight=900">
    
    <!-- React, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;700&display=swap');
        
        :root { --accent-light: #7e22ce; }
        html { background-color: #f9fafb; }
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-color: transparent; color: #111827; padding-top: env(safe-area-inset-top); }

        .bg-container { position: fixed; inset: 0; background-color: #e5e7eb; background-image: url('bg-mobile.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: -2; }
        .bg-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.2); z-index: -1; }
        @media (min-width: 1024px) { .bg-container { background-image: url('bg-desktop.jpg'); } }

        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-light) 0%, #9333ea 100%); color: white; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 10px 25px -5px rgba(126, 34, 206, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px -5px rgba(126, 34, 206, 0.5); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; font-size: 0.875rem; transition: all 0.2s; font-weight: 600; }
        .day-selected { background: var(--accent-light) !important; color: white !important; }
        .day-in-range { background-color: rgba(126, 34, 206, 0.08); }

        .modal-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Анимация пульсации для новых заявок */
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/hij5zlohk9jho';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHNaZVcGKnkCQmijqk2xGoc6Bn3tSNFwFUXUBDYGka0rHGDraOvOzfz3nu4zXOOAfbrhqrkJ9p-q5o/pub?gid=1091499446&single=true&output=csv';
        const FORMSPREE_ID = 'xqewzvbe'; 

        const parseCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            const items = [];
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const id = (currentLine[0] || '').replace(/^"|"$/g, '').trim();
                let category = (currentLine[1] || '').replace(/^"|"$/g, '').trim();
                let title = (currentLine[2] || '').replace(/^"|"$/g, '').trim();
                const description = (currentLine[3] || '').replace(/^"|"$/g, '').trim();
                const image = (currentLine[4] || '').replace(/^"|"$/g, '').trim();
                if (image || category || title) {
                    items.push({ id: id || `item-${i}`, category: category || 'Прочее', title: title || '', description: description || '', image: image || '' });
                }
            }
            return items;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('welcome');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [selectedItems, setSelectedItems] = useState([]);
            const [portfolioItems, setPortfolioItems] = useState([]);
            const [categories, setCategories] = useState([]);
            const [briefs, setBriefs] = useState([]); // Выносим заявки в глобальный стейт App
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dbError, setDbError] = useState(null); 
            const [formData, setFormData] = useState({ fullName: '', city: '', contacts: '', concept: '', dateFromObj: null, dateToObj: null, menuLink: '', comment: '' });
            const [dishCounts, setDishCounts] = useState({});
            
            const [isAdmin, setIsAdmin] = useState(localStorage.getItem('is_tastelab_admin') === 'true');
            const [showAdminAuth, setShowAdminAuth] = useState(false);
            const [adminPwd, setAdminPwd] = useState('');
            const [adminPwdError, setAdminPwdError] = useState(false);
            
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            useEffect(() => {
                const loadFirebase = async () => {
                    try {
                        const importModule = new Function('url', 'return import(url)');
                        const [appMod, authMod, fsMod] = await Promise.all([
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js')
                        ]);
                        const firebaseConfig = {
                            apiKey: "AIzaSyCbsJUDJ4AMJBi_UOnX23n-T-vGq4O4mGs",
                            authDomain: "menubuild-c3fc6.firebaseapp.com",
                            projectId: "menubuild-c3fc6",
                            storageBucket: "menubuild-c3fc6.firebasestorage.app",
                            messagingSenderId: "1013946778157",
                            appId: "1:1013946778157:web:cd1225bfeb3426720aeea4"
                        };
                        const app = appMod.initializeApp(firebaseConfig);
                        const auth = authMod.getAuth(app);
                        const db = fsMod.getFirestore(app);
                        setFb({ auth, db, authMod, fsMod });
                    } catch (e) { setDbError("Ошибка загрузки Firebase"); setIsLoadingData(false); }
                };
                loadFirebase();
            }, []);

            useEffect(() => {
                if (!fb) return;
                const { auth, authMod } = fb;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await authMod.signInWithCustomToken(auth, __initial_auth_token); } 
                            catch (e) { await authMod.signInAnonymously(auth); }
                        } else { await authMod.signInAnonymously(auth); }
                    } catch (e) { setDbError("Ошибка авторизации"); setIsLoadingData(false); }
                };
                initAuth();
                const unsub = authMod.onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [fb]);

            // Слушаем и портфолио, и заявки одновременно для счетчиков
            useEffect(() => {
                if (!fb || !user) return;
                const { db, fsMod } = fb;
                
                // Слушатель портфолио
                const unsubPort = fsMod.onSnapshot(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'portfolio'), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setPortfolioItems(items);
                    const allCats = new Set();
                    items.forEach(item => { if (item.category) item.category.split(',').forEach(c => allCats.add(c.trim())); });
                    setCategories([...allCats]);
                    setIsLoadingData(false);
                    setDbError(null); 
                });

                // Слушатель заявок (всегда активен, чтобы знать о новых)
                const unsubBriefs = fsMod.onSnapshot(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'briefs'), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setBriefs(items);
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                });

                return () => { unsubPort(); unsubBriefs(); };
            }, [fb, user, appId]);

            useEffect(() => { window.lucide && window.lucide.createIcons(); }, [activeTab, isLoadingData, mobileMenuOpen, dbError]);

            const navigateTo = (tab) => { setActiveTab(tab); setMobileMenuOpen(false); window.scrollTo(0, 0); };
            const resetApp = () => { setFormData({ fullName: '', city: '', contacts: '', concept: '', dateFromObj: null, dateToObj: null, menuLink: '', comment: '' }); setDishCounts({}); setSelectedItems([]); navigateTo('welcome'); };

            const handleLogin = () => {
                if (adminPwd === 'Kursant2026') {
                    setIsAdmin(true);
                    localStorage.setItem('is_tastelab_admin', 'true');
                    setShowAdminAuth(false);
                    setAdminPwd('');
                    navigateTo('admin');
                } else { setAdminPwdError(true); }
            };

            const unreadCount = useMemo(() => briefs.filter(b => b.isRead === false).length, [briefs]);

            if (isLoadingData) return <div className="min-h-screen flex flex-col items-center justify-center"><div className="w-16 h-16 border-4 border-gray-200 border-t-purple-600 rounded-full animate-spin mb-6"></div><h2 className="text-xl font-black uppercase tracking-[0.5em] text-gray-400 animate-pulse">Tastelab</h2></div>;

            return (
                <div className="min-h-screen relative text-gray-900">
                    <nav className="fixed w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 shadow-sm transition-colors">
                        <div className="max-w-7xl mx-auto px-6 h-20 lg:h-24 flex justify-between items-center">
                            <div className="text-2xl lg:text-3xl font-black tracking-tighter cursor-pointer" onClick={() => navigateTo('welcome')}>TASTE<span className="font-light text-gray-400">LAB</span></div>
                            <div className="hidden md:flex space-x-10 items-center">
                                <button onClick={() => navigateTo('welcome')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'welcome' ? 'text-gray-900' : 'text-gray-400'}`}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'portfolio' ? 'text-gray-900' : 'text-gray-400'}`}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="btn-primary px-8 py-3 rounded-full text-sm font-black uppercase tracking-widest flex items-center gap-3 shadow-lg">ТЗ {selectedItems.length > 0 && <span className="bg-white text-gray-900 px-2.5 py-0.5 rounded-full text-[10px]">{selectedItems.length}</span>}</button>
                            </div>
                            <button className="md:hidden text-gray-600 p-2" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}><Icon name={mobileMenuOpen ? "x" : "menu"} size={28} /></button>
                        </div>
                    </nav>

                    <main className="pt-24 lg:pt-32">
                        {activeTab === 'welcome' && <WelcomePage onNext={() => navigateTo('portfolio')} />}
                        {activeTab === 'portfolio' && <PortfolioPage items={portfolioItems} categories={categories} onNext={() => navigateTo('brief')} selectedItems={selectedItems} setSelectedItems={setSelectedItems} />}
                        {activeTab === 'admin' && <AdminPage fb={fb} appId={appId} portfolioItems={portfolioItems} briefs={briefs} onLogout={() => { setIsAdmin(false); localStorage.removeItem('is_tastelab_admin'); navigateTo('welcome'); }} />}
                        {activeTab === 'brief' && <BriefPage fb={fb} appId={appId} categories={categories} selectedItems={selectedItems} setSelectedItems={setSelectedItems} formData={formData} setFormData={setFormData} dishCounts={dishCounts} setDishCounts={setDishCounts} onReset={resetApp} onAddMore={() => navigateTo('portfolio')} />}
                    </main>

                    {/* Секретная кнопка с индикатором новых заявок */}
                    <button 
                        onClick={() => { if (isAdmin) navigateTo('admin'); else setShowAdminAuth(true); }} 
                        className={`fixed bottom-6 right-6 z-[100] p-3 rounded-full transition-all ${isAdmin ? 'bg-purple-600 text-white shadow-xl opacity-100' : 'opacity-10 hover:opacity-100 hover:bg-white text-gray-500 hover:shadow-xl'}`}
                    >
                        <div className="relative">
                            <Icon name={isAdmin ? "settings" : "home"} size={24} />
                            {unreadCount > 0 && <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white pulse-red"></span>}
                        </div>
                    </button>

                    {showAdminAuth && (
                        <div className="fixed inset-0 z-[200] bg-gray-900/40 backdrop-blur-md flex items-center justify-center p-4 modal-fade-in" onClick={() => setShowAdminAuth(false)}>
                            <div className="glass-card p-8 rounded-[2rem] w-full max-sm:mx-4 max-w-sm text-center relative border border-white/40 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowAdminAuth(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-900"><Icon name="x" size={20} /></button>
                                <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-600 shadow-inner"><Icon name="lock" size={24} /></div>
                                <h3 className="font-black text-xl uppercase mb-6 text-gray-900">Доступ закрыт</h3>
                                <input type="password" autoFocus placeholder="ПАРОЛЬ" className={`w-full bg-white/80 border ${adminPwdError ? 'border-red-500' : 'border-gray-200'} p-4 rounded-xl text-center font-black tracking-[0.5em] outline-none mb-4`} value={adminPwd} onChange={e => {setAdminPwd(e.target.value); setAdminPwdError(false);}} onKeyDown={e => { if(e.key === 'Enter') handleLogin(); }} />
                                <button onClick={handleLogin} className="w-full btn-primary py-4 rounded-xl font-black text-sm uppercase">Войти</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const AdminPage = ({ fb, appId, portfolioItems, briefs, onLogout }) => {
            const [adminTab, setAdminTab] = useState('portfolio');
            const [newItem, setNewItem] = useState({ category: '', title: '', description: '' });
            const [imageFile, setImageFile] = useState(null);
            const [imagePreview, setImagePreview] = useState("");
            const [statusMsg, setStatusMsg] = useState("");
            const [deletingId, setDeletingId] = useState(null);
            const [editingId, setEditingId] = useState(null);

            const unreadCount = useMemo(() => briefs.filter(b => b.isRead === false).length, [briefs]);

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            const maxDim = 800;
                            if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                            else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const markAsRead = async (briefId, currentStatus) => {
                if (currentStatus === true) return;
                try {
                    const { db, fsMod } = fb;
                    await fsMod.updateDoc(fsMod.doc(db, 'artifacts', appId, 'public', 'data', 'briefs', briefId), { isRead: true });
                } catch (e) { console.error("Error marking as read", e); }
            };

            const handleAddOrEdit = async (e) => {
                e.preventDefault();
                if (!fb) return;
                if (!imageFile && !editingId) { setStatusMsg("Загрузи фото!"); return; }
                setStatusMsg("Сохранение...");
                const { db, fsMod } = fb;
                try {
                    let finalImageStr = imagePreview;
                    if (imageFile) finalImageStr = await compressImage(imageFile);
                    if (editingId) {
                        await fsMod.updateDoc(fsMod.doc(db, 'artifacts', appId, 'public', 'data', 'portfolio', editingId), { category: newItem.category, title: newItem.title, description: newItem.description, image: finalImageStr });
                        setStatusMsg("Сохранено!");
                    } else {
                        const newOrder = portfolioItems.length > 0 ? Math.max(...portfolioItems.map(i => i.order || 0)) + 1 : 0;
                        await fsMod.addDoc(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'portfolio'), { category: newItem.category, title: newItem.title, description: newItem.description, image: finalImageStr, order: newOrder });
                        setStatusMsg("Добавлено!");
                    }
                    setTimeout(() => setStatusMsg(""), 3000);
                    setEditingId(null); setNewItem({ category: '', title: '', description: '' }); setImagePreview(""); setImageFile(null);
                } catch (err) { setStatusMsg("Ошибка"); }
            };

            return (
                <div className="max-w-4xl mx-auto px-6 py-12 space-y-10 pb-32">
                    {/* Уведомление о новых заявках сверху */}
                    {unreadCount > 0 && adminTab !== 'briefs' && (
                        <button 
                            onClick={() => setAdminTab('briefs')}
                            className="w-full bg-red-500 text-white p-4 rounded-2xl flex items-center justify-between shadow-lg shadow-red-500/20 modal-fade-in animate-bounce"
                        >
                            <div className="flex items-center gap-3">
                                <Icon name="bell" className="animate-pulse" />
                                <span className="font-black uppercase text-xs tracking-widest">У вас {unreadCount} новые заявки!</span>
                            </div>
                            <span className="text-[10px] font-bold border-b border-white/50">Посмотреть &rarr;</span>
                        </button>
                    )}

                    <div className="flex justify-between items-start">
                        <div className="flex-1">
                            <h2 className="text-4xl lg:text-6xl font-black uppercase tracking-tighter mb-3 text-gray-900">УПРАВЛЕНИЕ</h2>
                            <p className="text-gray-500 font-bold uppercase text-[10px] tracking-[0.4em]">Панель администратора ЧИКО</p>
                        </div>
                        <button onClick={onLogout} className="btn-secondary px-5 py-2.5 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 text-red-500 border-red-100 hover:bg-red-50 transition-colors shadow-sm"><Icon name="log-out" size={14} /> Выйти</button>
                    </div>

                    <div className="flex bg-gray-100 p-1.5 rounded-2xl w-fit mx-auto shadow-inner border border-gray-200">
                        <button onClick={() => setAdminTab('portfolio')} className={`px-6 py-2.5 rounded-xl text-xs font-black uppercase flex items-center gap-2 transition-all ${adminTab === 'portfolio' ? 'bg-white text-purple-600 shadow-sm' : 'text-gray-500'}`}><Icon name="layout-grid" size={16} /> Портфолио</button>
                        <button onClick={() => setAdminTab('briefs')} className={`px-6 py-2.5 rounded-xl text-xs font-black uppercase flex items-center gap-2 transition-all relative ${adminTab === 'briefs' ? 'bg-white text-purple-600 shadow-sm' : 'text-gray-500'}`}>
                            <Icon name="mail" size={16} /> Заявки 
                            {briefs.length > 0 && <span className={`px-2 py-0.5 rounded-full text-[10px] font-black ${unreadCount > 0 ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-600'}`}>{briefs.length}</span>}
                        </button>
                    </div>

                    {adminTab === 'portfolio' && (
                        <>
                            <div className={`glass-card p-6 lg:p-10 rounded-[2rem] space-y-6 ${editingId ? 'ring-4 ring-purple-500/20 shadow-xl' : ''}`}>
                                <div className="flex justify-between items-center border-b border-gray-200 pb-4 mb-4"><h3 className="font-black uppercase tracking-widest flex items-center gap-2 text-gray-900">{editingId ? 'Редактирование' : 'Добавить новую'}</h3>{editingId && <button onClick={() => {setEditingId(null); setNewItem({category:'', title:'', description:''}); setImagePreview("");}} className="text-xs font-black text-gray-400 hover:text-gray-900">Отмена</button>}</div>
                                <form onSubmit={handleAddOrEdit} className="space-y-6">
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <input placeholder="Категории" className="w-full bg-white/60 border border-gray-200 p-4 rounded-xl text-sm outline-none focus:border-purple-500 transition-colors" value={newItem.category} onChange={e => setNewItem({...newItem, category: e.target.value})} />
                                        <input placeholder="Название" className="w-full bg-white/60 border border-gray-200 p-4 rounded-xl text-sm outline-none focus:border-purple-500 transition-colors" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-center gap-4">
                                        <label className="w-full sm:flex-1 border-2 border-dashed border-gray-300 hover:border-purple-400 bg-white/50 p-6 rounded-xl text-center cursor-pointer flex flex-col items-center justify-center min-h-[100px] group transition-colors"><input type="file" accept="image/*" className="hidden" onChange={e => { const file = e.target.files[0]; if(file) {setImageFile(file); setImagePreview(URL.createObjectURL(file));}}} /><Icon name="upload" className="text-gray-400 group-hover:text-purple-600 mb-2 transition-colors" size={24} /><span className="text-xs font-bold text-gray-500 uppercase">{imageFile ? imageFile.name : (editingId ? "Сменить фото" : "Выбрать фото")}</span></label>
                                        {imagePreview && <div className="w-24 h-24 shrink-0 rounded-xl overflow-hidden border relative shadow-sm"><img src={imagePreview} className="w-full h-full object-cover" />{imageFile && <button onClick={() => {setImageFile(null); if(!editingId) setImagePreview("");}} className="absolute top-1 right-1 bg-white/80 p-1 rounded-full text-red-500 transition-opacity"><Icon name="x" size={12} /></button>}</div>}
                                    </div>
                                    <textarea placeholder="Описание" className="w-full bg-white/60 border border-gray-200 p-4 rounded-xl text-sm h-24 resize-none outline-none focus:border-purple-500 transition-colors" value={newItem.description} onChange={e => setNewItem({...newItem, description: e.target.value})} />
                                    <div className="flex items-center gap-4"><button type="submit" disabled={!imageFile && !editingId} className="btn-primary px-8 py-3 rounded-xl font-black text-sm uppercase disabled:opacity-50 transition-all">{editingId ? "Сохранить" : "Добавить"}</button>{statusMsg && <span className="text-xs font-bold text-gray-600">{statusMsg}</span>}</div>
                                </form>
                            </div>
                            <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-3">
                                {portfolioItems.map((item, index) => (
                                    <div key={item.id} className={`flex items-center gap-3 bg-white/80 p-3 rounded-xl border ${editingId === item.id ? 'border-purple-400 shadow-md' : 'border-gray-100 shadow-sm'} transition-all`}>
                                        <img src={item.image} className="w-12 h-12 rounded-lg object-cover bg-gray-100" />
                                        <div className="flex-1 truncate">
                                            <p className="text-[10px] font-black text-purple-500 uppercase truncate">{item.category || 'Без категории'}</p>
                                            <p className="text-sm font-bold truncate text-gray-900">{item.title || 'Без названия'}</p>
                                        </div>
                                        <button onClick={() => {setEditingId(item.id); setNewItem({category:item.category||'', title:item.title||'', description:item.description||''}); setImagePreview(item.image); window.scrollTo({top:0, behavior:'smooth'});}} className="p-2 text-gray-400 hover:text-purple-600 transition-colors"><Icon name="pencil" size={18} /></button>
                                        <button onClick={async () => { if(window.confirm('Удалить?')) { const {db, fsMod} = fb; await fsMod.deleteDoc(fsMod.doc(db, 'artifacts', appId, 'public', 'data', 'portfolio', item.id)); } }} className="p-2 text-gray-400 hover:text-red-500 transition-colors"><Icon name="trash" size={18} /></button>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {adminTab === 'briefs' && (
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            {briefs.length === 0 ? <div className="text-center py-12 text-gray-400 font-bold uppercase text-xs">Пока нет заявок</div> : (
                                <div className="space-y-6">
                                    {briefs.map(brief => (
                                        <div 
                                            key={brief.id} 
                                            onClick={() => markAsRead(brief.id, brief.isRead)}
                                            className={`bg-white/80 p-6 lg:p-8 rounded-[2rem] border transition-all relative group cursor-pointer ${brief.isRead === false ? 'border-red-200 shadow-lg shadow-red-500/5 ring-1 ring-red-100' : 'border-gray-100 shadow-sm hover:shadow-md'}`}
                                        >
                                            {brief.isRead === false && (
                                                <div className="absolute top-6 left-6 flex items-center gap-1.5 bg-red-500 text-white px-2 py-0.5 rounded-full shadow-sm shadow-red-500/20 z-10">
                                                    <span className="w-1.5 h-1.5 bg-white rounded-full animate-ping"></span>
                                                    <span className="text-[8px] font-black uppercase tracking-tighter">NEW</span>
                                                </div>
                                            )}
                                            
                                            <button onClick={async (e) => { e.stopPropagation(); if(window.confirm('Удалить ТЗ?')) { const {db, fsMod} = fb; await fsMod.deleteDoc(fsMod.doc(db, 'artifacts', appId, 'public', 'data', 'briefs', brief.id)); }}} className="absolute top-6 right-6 text-gray-300 hover:text-red-500 transition-colors"><Icon name="trash" size={20} /></button>
                                            
                                            <div className="mb-6 pr-10 pt-2">
                                                <p className="text-[10px] text-purple-600 font-black uppercase mb-1">{brief['Дата']}</p>
                                                <h4 className="text-2xl font-black text-gray-900 uppercase tracking-tighter leading-none">{brief['Имя']}</h4>
                                                <p className="text-sm font-bold text-gray-500 mt-2 flex items-center gap-2"><Icon name="map-pin" size={14}/> {brief['Город']} • <Icon name="message-circle" size={14}/> {brief['Контакты']}</p>
                                            </div>

                                            {brief.selectedImageData && brief.selectedImageData.length > 0 && (
                                                <div className="mb-6 space-y-2">
                                                    <span className="text-[10px] font-black uppercase text-purple-600 flex items-center gap-2"><Icon name="camera" size={12}/> Мудборд ({brief.selectedImageData.length})</span>
                                                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                                        {brief.selectedImageData.map((img, idx) => <img key={idx} src={img.image} className="w-24 h-24 shrink-0 rounded-xl object-cover border border-gray-100 shadow-sm bg-gray-50" />)}
                                                    </div>
                                                </div>
                                            )}

                                            <div className="grid md:grid-cols-2 gap-4 text-sm">
                                                <div className="bg-gray-50/50 p-4 rounded-2xl border border-gray-100"><span className="text-[9px] text-gray-400 font-black uppercase block mb-1">Концепция</span><p className="font-medium text-gray-700 leading-relaxed">{brief['Концепция']}</p></div>
                                                <div className="bg-gray-50/50 p-4 rounded-2xl border border-gray-100"><span className="text-[9px] text-gray-400 font-black uppercase block mb-1">Сроки</span><p className="font-black text-gray-900">{brief['Сроки (от)']} — {brief['Сроки (до)']}</p></div>
                                            </div>
                                            <div className="bg-gray-900 p-4 rounded-2xl mt-4 text-white text-xs leading-relaxed"><span className="text-[9px] text-gray-500 font-black uppercase block mb-1">Заказ</span>{brief['Выбранные блюда']}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const WelcomePage = ({ onNext }) => (
            <div className="max-w-5xl mx-auto px-6 py-12 lg:py-24 flex flex-col items-center justify-center text-center min-h-[60vh]">
                <div className="space-y-8"><h1 className="text-5xl lg:text-8xl font-black leading-[0.9] tracking-tighter text-gray-900 uppercase">Лаборатория <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-purple-800 text-glow">Хитов</span></h1><p className="text-lg lg:text-xl text-black font-bold uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,1)]">Проектируем гастрономические смыслы. <br className="hidden md:block"/> От идеи до идеальной подачи.</p><button onClick={onNext} className="btn-primary px-10 py-4 rounded-full text-base font-black uppercase tracking-widest flex items-center gap-3 mx-auto shadow-xl transition-all active:scale-95">Портфолио <Icon name="arrow-right" size={18} /></button></div>
            </div>
        );

        const PortfolioPage = ({ items, categories, onNext, selectedItems, setSelectedItems }) => {
            const [cat, setCat] = useState('Все');
            const [previewItem, setPreviewItem] = useState(null);
            const filtered = useMemo(() => { if (cat === 'Все') return items; return items.filter(i => i.category && i.category.split(',').map(c => c.trim()).includes(cat)); }, [items, cat]);
            const toggle = (i) => setSelectedItems(prev => prev.find(x => x.id === i.id) ? prev.filter(x => x.id !== i.id) : [...prev, i]);
            return (
                <div className="max-w-7xl mx-auto px-6 py-12 lg:py-16">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-12">
                        <div><h2 className="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-2 text-gray-900 tracking-tighter">БАЗА <span className="text-purple-600">РЕФЕРЕНСОВ</span></h2><p className="text-gray-500 font-bold uppercase text-[10px] tracking-[0.4em]">Архив для вашего вдохновения</p></div>
                        <div className="flex flex-wrap gap-2">{['Все', ...categories].map(c => <button key={c} onClick={() => setCat(c)} className={`px-5 py-2 rounded-lg text-[9px] font-black uppercase transition-all shadow-sm ${cat === c ? 'bg-purple-600 text-white shadow-purple-600/20' : 'bg-white/60 border border-gray-100 text-gray-500 hover:text-gray-900'}`}>{c}</button>)}</div>
                    </div>
                    <div className="grid grid-cols-3 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 sm:gap-10">
                        {filtered.map(i => {
                            const active = selectedItems.find(x => x.id === i.id);
                            return (
                                <div key={i.id} onClick={() => setPreviewItem(i)} className={`group relative aspect-square rounded-xl sm:rounded-[2.5rem] overflow-hidden border transition-all duration-500 cursor-zoom-in bg-gray-100 ${active ? 'border-purple-500 ring-2 sm:ring-8 ring-purple-500/10' : 'border-gray-200 hover:-translate-y-1 shadow-sm'}`}>
                                    <img src={i.image} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-110" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 p-2 sm:p-8 flex flex-col justify-end">
                                        <button onClick={(e) => { e.stopPropagation(); toggle(i); }} className={`mt-1 sm:mt-4 p-2 sm:px-5 sm:py-3 rounded-lg sm:rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-xl font-black uppercase text-[8px] sm:text-[10px] self-start ${active ? 'bg-purple-600 text-white' : 'bg-white/40 backdrop-blur-md text-gray-900 hover:bg-white'}`}>
                                            <Icon name={active ? 'check' : 'plus'} size={14} />
                                            <span className="hidden sm:inline">{active ? 'В брифе' : '+ Добавить в бриф'}</span>
                                        </button>
                                    </div>
                                    {active && <div className="absolute top-1 right-1 sm:top-4 sm:right-4 bg-purple-600 text-white p-1 sm:p-2 rounded-full shadow-lg"><Icon name="check" size={10} /></div>}
                                </div>
                            );
                        })}
                    </div>
                    {previewItem && (
                        <div className="fixed inset-0 z-[100] bg-white/20 backdrop-blur-xl flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setPreviewItem(null)}>
                            <div className="max-w-6xl w-full h-full flex flex-col items-center justify-center modal-fade-in relative z-[110]" onClick={e => e.stopPropagation()}>
                                <img src={previewItem.image} className="max-h-[60vh] lg:max-h-[70vh] w-auto rounded-[2rem] shadow-2xl border border-gray-200 object-contain cursor-zoom-out" onClick={() => setPreviewItem(null)} />
                                <div className="mt-8 text-center max-w-2xl px-6 flex flex-col items-center">
                                    {previewItem.category && <span className="text-[10px] font-black text-purple-600 uppercase tracking-[0.5em] mb-2 block">{previewItem.category}</span>}
                                    {previewItem.title && <h2 className="text-3xl lg:text-5xl font-black text-gray-900 uppercase mb-3 leading-none tracking-tighter">{previewItem.title}</h2>}
                                    {previewItem.description && <p className="text-gray-500 font-medium mb-6 text-sm sm:text-base">{previewItem.description}</p>}
                                    <button onClick={(e) => { e.stopPropagation(); toggle(previewItem); }} className={`px-8 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl font-black uppercase text-xs ${selectedItems.find(x => x.id === previewItem.id) ? 'bg-purple-600 text-white' : 'bg-gray-900 text-white'}`}><Icon name={selectedItems.find(x => x.id === previewItem.id) ? 'check' : 'plus'} size={20} />{selectedItems.find(x => x.id === previewItem.id) ? 'Добавлено в бриф' : '+ Добавить в бриф'}</button>
                                </div>
                                <button onClick={() => setPreviewItem(null)} className="absolute top-4 right-4 bg-gray-900 text-white p-2 rounded-full hover:scale-110 transition-transform shadow-lg"><Icon name="x" size={16} /></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const BriefPage = ({ fb, appId, categories, selectedItems, setSelectedItems, formData, setFormData, dishCounts, setDishCounts, onReset, onAddMore }) => {
            const [submitted, setSubmitted] = useState(false); const [sending, setSending] = useState(false); const [warn, setWarn] = useState(false);
            const [uploadingStatus, setUploadingStatus] = useState("");

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            const maxDim = 800; if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
                            else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files); if (!files.length) return;
                setUploadingStatus("Сжимаем фото...");
                const newItems = await Promise.all(files.map(async (file, idx) => { 
                    const compressed = await compressImage(file);
                    return { id: `local-${Date.now()}-${idx}-${Math.random().toString(36).substr(2, 4)}`, category: 'Свой файл', title: file.name, image: compressed, isLocal: true }; 
                }));
                setSelectedItems(prev => [...prev, ...newItems]);
                setUploadingStatus("");
            };

            const send = async () => {
                if (!formData.dateFromObj || !formData.dateToObj) return;
                setSending(true);
                const itemsStr = Object.entries(dishCounts).filter(([_,v]) => v > 0).map(([c, v]) => `${c}: ${v}`).join(', ');
                const refsStr = selectedItems.map(i => i.title || 'Блюдо').join(', ');
                const imageData = selectedItems.map(i => ({ title: i.title, image: i.image }));

                const finalData = { 
                    "Дата": new Date().toLocaleString('ru-RU'), "Имя": formData.fullName, "Город": formData.city, "Контакты": formData.contacts, 
                    "Концепция": formData.concept, "Сроки (от)": formData.dateFromObj.toLocaleDateString('ru-RU'), "Сроки (до)": formData.dateToObj.toLocaleDateString('ru-RU'), 
                    "Ссылка на материалы": formData.menuLink, "Комментарий": formData.comment || '-', 
                    "Выбранные блюда": `Нужно: ${itemsStr || 'не указано'} | Референсы: ${refsStr || 'нет'}`, 
                    "selectedImageData": imageData,
                    "isRead": false // Новое ТЗ всегда непрочитано
                };

                try {
                    let ps = [ fetch(SHEETDB_API_URL + '?sheet=ТЗ', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: { ...finalData, "selectedImageData": "В админке" } }) }), fetch(`https://formspree.io/f/${FORMSPREE_ID}`, { method: 'POST', headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }, body: JSON.stringify({ subject: `Заявка: ${formData.fullName}`, ...finalData, "selectedImageData": "В админке" }) }) ];
                    if (fb) ps.push(fb.fsMod.addDoc(fb.fsMod.collection(fb.db, 'artifacts', appId, 'public', 'data', 'briefs'), { createdAt: Date.now(), ...finalData }));
                    await Promise.all(ps); setSubmitted(true);
                } catch (e) { console.error(e); } finally { setSending(false); }
            };

            if (submitted) return <div className="py-24 text-center max-w-xl mx-auto px-6 modal-fade-in"><div className="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-8 text-purple-600 animate-bounce shadow-inner"><Icon name="check" size={40} /></div><h2 className="text-4xl font-black mb-3 uppercase text-gray-900 tracking-tighter tracking-tighter">ПРИНЯТО</h2><p className="text-gray-500 mb-10 uppercase text-xs font-bold tracking-widest">ТЗ в обработке. Ожидайте звонка.</p><button onClick={onReset} className="text-purple-600 font-black text-sm uppercase tracking-widest border-b-2 border-purple-200 hover:border-purple-600 pb-1 transition-all">Вернуться</button></div>;
            const inputClass = "w-full bg-white/60 border border-gray-200 p-4 rounded-xl outline-none focus:border-purple-400 font-medium text-sm text-gray-900 transition-all focus:bg-white shadow-inner";
            return (
                <div className="max-w-4xl mx-auto px-6 py-8 space-y-12 pb-24 text-gray-900">
                    <div className="text-center"><h2 className="text-4xl lg:text-6xl font-black uppercase mb-3 text-gray-900 tracking-tighter">БРИФИНГ</h2><p className="text-gray-400 font-bold uppercase text-[10px] tracking-[0.4em]">Сборка технического задания</p></div>
                    <form onSubmit={e => { e.preventDefault(); !formData.concept ? setWarn(true) : send(); }} className="space-y-8">
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6"><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest">01. Контакты</h3><div className="grid md:grid-cols-2 gap-5"><input required placeholder="ФИО / Компания *" className={inputClass} value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} /><input required placeholder="Город *" className={inputClass} value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} /></div><input required placeholder="Telegram / WhatsApp *" className={inputClass} value={formData.contacts} onChange={e => setFormData({...formData, contacts: e.target.value})} /></div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6"><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest">02. Тайминг</h3><DateRangePicker startDate={formData.dateFromObj} endDate={formData.dateToObj} onChange={(start, end) => setFormData({...formData, dateFromObj: start, dateToObj: end})} /></div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6"><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest">03. Концепт</h3><textarea required placeholder="Опишите ваши идеи *" className={`${inputClass} h-32 resize-none`} value={formData.concept} onChange={e => setFormData({...formData, concept: e.target.value})} /><input placeholder="Ссылка на материалы" className={inputClass} value={formData.menuLink} onChange={e => setFormData({...formData, menuLink: e.target.value})} /></div>
                        <div className="space-y-4"><h3 className="text-[10px] font-black text-purple-600 uppercase ml-2 tracking-widest">04. Объемы</h3><div className="grid grid-cols-2 lg:grid-cols-4 gap-3">{['Десерты', 'Бар', 'Кухня', 'Прочее'].map(c => <div key={c} className="glass-card p-4 rounded-xl border flex flex-col gap-3 group hover:border-purple-300 transition-colors shadow-sm"><span className="text-[9px] font-black uppercase text-gray-400 truncate tracking-widest">{c}</span><div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-lg border border-gray-100"><button type="button" onClick={() => setDishCounts({...dishCounts, [c]: Math.max(0, (dishCounts[c]||0)-1)})} className="w-7 h-7 bg-white rounded flex items-center justify-center shadow-sm text-gray-500 hover:text-gray-900 transition-colors"><Icon name="minus" size={12} /></button><span className="font-black text-gray-900">{dishCounts[c]||0}</span><button type="button" onClick={() => setDishCounts({...dishCounts, [c]: (dishCounts[c]||0)+1})} className="w-7 h-7 bg-purple-600 text-white rounded flex items-center justify-center shadow-sm hover:bg-purple-700 transition-colors"><Icon name="plus" size={12} /></button></div></div>)}</div></div>
                        <div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6">
                            <div className="flex justify-between items-center gap-4"><h3 className="text-[10px] font-black uppercase text-purple-600 tracking-widest">05. Референсы ({selectedItems.length})</h3><div className="flex gap-2"><label className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase cursor-pointer flex items-center gap-2 hover:bg-purple-50 transition-colors shadow-sm"><Icon name="upload" size={12} className="text-purple-600"/> {uploadingStatus || "С устройства"} <input type="file" multiple accept="image/*" className="hidden" onChange={handleFileUpload} /></label><button type="button" onClick={onAddMore} className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 hover:bg-purple-50 transition-colors shadow-sm"><Icon name="layout-grid" size={12} className="text-purple-600"/> Из базы</button></div></div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">{selectedItems.map(item => <div key={item.id} className="bg-white/80 border rounded-xl p-2.5 flex items-center gap-3 shadow-sm hover:shadow-md transition-shadow"><img src={item.image} className="w-10 h-10 rounded-lg object-cover bg-gray-50" /><p className="flex-1 text-xs font-black truncate uppercase tracking-tight text-gray-900">{item.title || 'Блюдо'}</p><button type="button" onClick={() => setSelectedItems(prev => prev.filter(x => x.id !== item.id))} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="x" size={14} /></button></div>)}{selectedItems.length === 0 && <p className="text-[10px] font-black text-gray-300 uppercase text-center py-8 border-2 border-dashed border-gray-100 rounded-xl w-full col-span-full tracking-widest">Пусто</p>}</div>
                        </div>
                        <button type="submit" disabled={sending} className="w-full btn-primary py-5 rounded-[1.5rem] font-black text-lg uppercase disabled:opacity-50 transition-all mt-2 active:scale-95 shadow-xl tracking-[0.2em]">{sending ? 'Отправка...' : 'Отправить ТЗ в работу'}</button>
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
