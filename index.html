<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASTELAB — Premium Gastronomy Lab</title>
    
    <!-- Настройки для iOS (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TasteLab">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/initials/svg?seed=TL&backgroundColor=7e22ce&fontSize=50&fontWeight=900">
    
    <!-- Библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@300;700&display=swap');
        :root { --accent-light: #7e22ce; }
        html { background-color: #f9fafb; }
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-color: transparent; color: #111827; padding-top: env(safe-area-inset-top); }
        
        .bg-container { position: fixed; inset: 0; background-color: #e5e7eb; background-image: url('bg-mobile.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; z-index: -2; }
        .bg-overlay { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.2); z-index: -1; }
        @media (min-width: 1024px) { .bg-container { background-image: url('bg-desktop.jpg'); } }

        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent-light) 0%, #9333ea 100%); color: white; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 10px 25px -5px rgba(126, 34, 206, 0.4); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 12px; font-size: 0.875rem; transition: all 0.2s; font-weight: 600; }
        .day-selected { background: var(--accent-light) !important; color: white !important; }
        .day-in-range { background-color: rgba(126, 34, 206, 0.08); }

        .modal-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- 0. КОМПОНЕНТ ИКОНОК ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'plus': <path d="M12 5v14M5 12h14" />,
                'check': <path d="M20 6 9 17l-5-5" />,
                'trash': <React.Fragment><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><path d="M10 11v6" /><path d="M14 11v6" /></React.Fragment>,
                'x': <path d="M18 6 6 18M6 6l12 12" />,
                'edit-3': <React.Fragment><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></React.Fragment>,
                'chevron-right': <path d="m9 18 6-6-6-6" />,
                'chevron-left': <path d="m15 18-6-6 6-6" />,
                'layout-grid': <path d="M3 3h7v7H3zm11 0h7v7h-7zm0 11h7v7h-7zm-11 0h7v7H3z" />,
                'mail': <React.Fragment><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /><path d="M20 20H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2Z" /></React.Fragment>,
                'log-out': <React.Fragment><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="m16 17 5-5-5-5" /><path d="M21 12H9" /></React.Fragment>,
                'images': <React.Fragment><path d="M18 22H4a2 2 0 0 1-2-2V6" /><path d="M22 13V4a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2Z" /><path d="M9 13l3-3 3 3" /><path d="M12 10v8" /></React.Fragment>,
                'download': <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m17 8-5-5-5 5" /><path d="M12 3v12" /></React.Fragment>,
                'send': <path d="m22 2-7 20-4-9-9-4Z" />,
                'home': <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />,
                'settings': <React.Fragment><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.17a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></React.Fragment>,
                'pencil': <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
                'lock': <React.Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></React.Fragment>,
                'map-pin': <React.Fragment><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></React.Fragment>,
                'message-circle': <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />,
                'upload': <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m17 8-5-5-5 5" /><path d="M12 3v12" /></React.Fragment>,
                'minus': <path d="M5 12h14" />,
                'shield-check': <React.Fragment><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></React.Fragment>,
                'mail-warning': <React.Fragment><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h9" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /><path d="M19 16v3" /><path d="M19 22v.01" /></React.Fragment>,
                'calendar': <React.Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></React.Fragment>,
                'instagram': <React.Fragment><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></React.Fragment>,
                'phone': <React.Fragment><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></React.Fragment>
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- 1. ВСПОМОГАТЕЛЬНЫЕ КОМПОНЕНТЫ ---

        const DateRangePicker = ({ startDate, endDate, onChange }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            
            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear(); const month = currentMonth.getMonth();
                const date = new Date(year, month, 1); const days = [];
                let firstDay = date.getDay() - 1; if (firstDay === -1) firstDay = 6;
                for (let i = 0; i < firstDay; i++) days.push(null);
                while (date.getMonth() === month) { days.push(new Date(date)); date.setDate(date.getDate() + 1); }
                return days;
            }, [currentMonth]);

            const handleDateClick = (clickedDate) => {
                if (!clickedDate) return;
                if (!startDate || (startDate && endDate)) {
                    onChange(clickedDate, null);
                } else if (clickedDate < startDate) {
                    onChange(clickedDate, null);
                } else {
                    onChange(startDate, clickedDate);
                }
            };

            return (
                <div className="glass-card rounded-[2rem] p-6 select-none shadow-lg border border-white/50">
                    <div className="flex justify-between items-center mb-6">
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() - 1)))} className="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"><Icon name="chevron-left" /></button>
                        <h4 className="font-black uppercase tracking-widest text-[10px]">{months[currentMonth.getMonth()]} {currentMonth.getFullYear()}</h4>
                        <button type="button" onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() + 1)))} className="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors"><Icon name="chevron-right" /></button>
                    </div>
                    <div className="calendar-grid gap-1">
                        {["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"].map(d => <div key={d} className="text-[9px] font-black text-gray-400 text-center uppercase py-2">{d}</div>)}
                        {daysInMonth.map((date, i) => {
                            const isStart = startDate && date && date.toDateString() === startDate.toDateString();
                            const isEnd = endDate && date && date.toDateString() === endDate.toDateString();
                            const inRange = date && startDate && endDate && date > startDate && date < endDate;
                            const isToday = date && date.toDateString() === new Date().toDateString();

                            return (
                                <div 
                                    key={i} 
                                    onClick={() => handleDateClick(date)} 
                                    className={`calendar-day ${!date ? 'empty pointer-events-none' : 'text-gray-800'} 
                                        ${isStart || isEnd ? 'day-selected shadow-md' : ''} 
                                        ${inRange ? 'day-in-range' : ''} 
                                        ${isToday ? 'day-today border border-purple-200' : ''}`}
                                >
                                    {date ? date.getDate() : ""}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- 2. СТРАНИЦЫ ---

        const WelcomePage = ({ onNext }) => {
            const chefs = [
                {
                    id: 1,
                    name: 'Курсант Хан',
                    role: 'Эксперт Японской и Паназиатской кухни',
                    bioList: [
                        'Бренд-шеф сети ресторанов Asia',
                        'Концепт-шеф японского направления ресторана Aist',
                        'Концепт-шеф сети ресторанов Yellowfin',
                        'Победитель Korea International Culinary Competition 2024'
                    ],
                    image: './chef-kursant.jpg',
                    inst: 'https://www.instagram.com/kursant.asianchef/related_profiles/?ref=CLIBFB-CLIBFB-CLIBFB-CLIBFB-cpgbanner1-SB_15032021-SB_15032021-SB_15032021-cpgbanner1',
                    tg: 'https://t.me/+2jAkYy4PaL44Yjdi'
                },
                {
                    id: 2,
                    name: 'Бондарь Иван',
                    role: 'Операционный Шеф-повар',
                    bioList: [
                        'Курирование операционных процессов сети ресторанов Yellowfin.',
                        'Запуск меню и внедрение санитарных норм более 15 проектов совместно с Нурадиновым Курсантом.',
                        'Преподавание операционного блока в составе общего курса от Нурадинова Курсанта в академии STANFOOD и Resfood.'
                    ],
                    image: './chef-ivan.jpg',
                    inst: 'https://www.instagram.com/ivanb.ondar?igsh=MWtpeGttazg0NDZoeA%3D%3D&utm_source=qr',
                    tg: 'https://t.me/foodcasse'
                }
            ];

            return (
                <div className="pb-24">
                    {/* Главный блок */}
                    <div className="max-w-5xl mx-auto px-6 py-12 lg:py-24 flex flex-col items-center justify-center text-center text-gray-900">
                        <h1 className="text-5xl lg:text-8xl font-black leading-[0.9] tracking-tighter uppercase mb-8">Лаборатория <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-purple-800 text-glow">Хитов</span></h1>
                        <p className="text-lg lg:text-xl font-bold uppercase tracking-widest mb-10 max-w-2xl">Проектируем гастрономические смыслы. <br className="hidden md:block"/> От идеи до идеальной подачи.</p>
                        <button onClick={onNext} className="btn-primary px-12 py-5 rounded-full text-base font-black uppercase tracking-widest flex items-center gap-3 mx-auto shadow-xl transition-all active:scale-95 text-white">Портфолио <Icon name="chevron-right" size={18} /></button>
                    </div>

                    {/* Блок Команды */}
                    <div className="max-w-6xl mx-auto px-6 mt-16 lg:mt-24">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl lg:text-5xl font-black uppercase tracking-tighter text-gray-900 leading-none">Шефы</h2>
                            <div className="h-1 w-16 bg-purple-600 mx-auto mt-6 rounded-full"></div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-12 lg:gap-20">
                            {chefs.map((chef) => (
                                <div key={chef.id} className="flex flex-col group text-left">
                                    <div className="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden shadow-2xl mb-8 border border-gray-100 bg-gray-200">
                                        <img src={chef.image} alt={chef.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-gray-900/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                                    </div>
                                    
                                    <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-6 mb-6">
                                        <div>
                                            <h3 className="text-2xl lg:text-3xl font-black uppercase tracking-tighter text-gray-900 leading-none">{chef.name}</h3>
                                            <p className="text-[10px] font-black text-purple-600 uppercase tracking-[0.3em] mt-3">{chef.role}</p>
                                        </div>
                                        
                                        {/* Соцсети */}
                                        <div className="flex gap-2 shrink-0">
                                            <a href={chef.inst} target="_blank" className="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-900 hover:bg-purple-600 hover:text-white hover:border-purple-600 transition-colors shadow-sm"><Icon name="instagram" size={18} /></a>
                                            <a href={chef.tg} target="_blank" className="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-900 hover:bg-purple-600 hover:text-white hover:border-purple-600 transition-colors shadow-sm"><Icon name="send" size={16} /></a>
                                        </div>
                                    </div>
                                    
                                    {/* Список регалий */}
                                    <div className="text-gray-600 text-sm font-medium leading-relaxed space-y-3">
                                        {chef.bioList.map((item, idx) => (
                                            <p key={idx} className="flex items-start gap-3">
                                                <span className="text-purple-600 font-bold mt-0.5 opacity-70">—</span>
                                                <span>{item}</span>
                                            </p>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const PortfolioPage = ({ items, categories, onNext, selectedItems, setSelectedItems }) => {
            const [cat, setCat] = useState('Все');
            const [previewItem, setPreviewItem] = useState(null);
            
            const list = Array.isArray(items) ? items : [];
            const safeSelected = Array.isArray(selectedItems) ? selectedItems : [];
            
            const filtered = useMemo(() => {
                if (cat === 'Все') return list;
                return list.filter(i => i && i.category && i.category.split(',').map(c => c.trim()).includes(cat));
            }, [list, cat]);

            const toggle = (i) => {
                if (!i || !i.id) return;
                setSelectedItems(prev => {
                    const current = Array.isArray(prev) ? prev : [];
                    return current.find(x => x.id === i.id) ? current.filter(x => x.id !== i.id) : [...current, i];
                });
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 lg:py-16 text-gray-900 relative">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-10 text-gray-900">
                        <div>
                            <h2 className="text-4xl lg:text-7xl font-black uppercase tracking-tighter mb-2 leading-none text-gray-900">БАЗА <span className="text-purple-600 text-glow">РЕФЕРЕНСОВ</span></h2>
                            <p className="text-gray-500 font-bold uppercase text-[10px] tracking-[0.4em] mt-2">Архив для вашего вдохновения</p>
                        </div>
                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">
                             <div className="flex flex-wrap gap-1.5">{['Все', ...(Array.isArray(categories) ? categories : [])].map(c => <button key={c} onClick={() => setCat(c)} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all shadow-sm ${cat === c ? 'bg-purple-600 text-white shadow-purple-600/20' : 'bg-white border border-gray-100 text-gray-500 hover:text-gray-900'}`}>{c}</button>)}</div>
                             <button onClick={onNext} className="btn-primary px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-3 shadow-lg active:scale-95 text-white">
                                {safeSelected.length > 0 ? <>Составить ТЗ ({safeSelected.length}) <Icon name="chevron-right" size={14}/></> : <>Начать бриф <Icon name="edit-3" size={14}/></>}
                             </button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-3 sm:grid-cols-2 lg:grid-cols-3 gap-1.5 sm:gap-10">
                        {filtered.map(i => {
                            if (!i || !i.id) return null;
                            const active = safeSelected.find(x => x.id === i.id);
                            return (
                                <div key={i.id} onClick={() => setPreviewItem(i)} className={`group relative aspect-square rounded-xl sm:rounded-[2.5rem] overflow-hidden border transition-all duration-500 cursor-zoom-in bg-gray-200 ${active ? 'border-purple-600 ring-2 sm:ring-8 ring-purple-600/10 shadow-xl' : 'border-transparent'}`}>
                                    <img src={i.image} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-110" />
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); toggle(i); }} 
                                        className={`absolute bottom-1.5 right-1.5 sm:bottom-6 sm:right-6 w-8 h-8 sm:w-11 sm:h-11 rounded-lg sm:rounded-xl flex items-center justify-center shadow-2xl transition-all active:scale-90 z-20 ${active ? 'bg-purple-600 text-white' : 'bg-gray-900/90 backdrop-blur-md text-white'}`}
                                    >
                                        <Icon name={active ? 'check' : 'plus'} size={active ? 12 : 18} />
                                    </button>
                                </div>
                            );
                        })}
                    </div>

                    {safeSelected.length > 0 && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[90] sm:hidden modal-fade-in w-full px-6 text-gray-900">
                            <button onClick={onNext} className="w-full btn-primary px-8 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-2xl flex items-center justify-center gap-3 border border-white/20 transition-all active:scale-95 text-white"><Icon name="send" size={16}/> Составить ТЗ ({safeSelected.length})</button>
                        </div>
                    )}

                    {previewItem && (
                        <div className="fixed inset-0 z-[100] bg-gray-900/60 backdrop-blur-xl flex items-center justify-center p-4 cursor-zoom-out" onClick={() => setPreviewItem(null)}>
                            <div className="max-w-6xl w-full h-fit flex flex-col items-center justify-center modal-fade-in relative z-[110]" onClick={e => e.stopPropagation()}>
                                <div className="relative group bg-white p-2 rounded-[2rem] shadow-2xl mx-auto">
                                    <img src={previewItem.image} className="max-h-[65vh] lg:max-h-[85vh] w-auto rounded-[1.5rem] object-contain cursor-zoom-out bg-white" onClick={() => setPreviewItem(null)} />

        const AdminPage = ({ fb, appId, portfolioItems, briefs, onLogout, onGoToBrief }) => {

                                    canv.width=w; canv.height=h; const ctx = canv.getContext('2d'); ctx.drawImage(img,0,0,w,h);
                                    res(canv.toDataURL('image/jpeg', 0.8));

                            reader.readAsDataURL(imageFile);

                                <div key={brief.id} onClick={() => { setPreviewBrief(brief); markAsRead(brief.id, brief.isRead); }} className={`bg-white/80 p-5 rounded-2xl border relative cursor-pointer transition-all ${brief.isRead === false ? 'border-red-200 ring-1 ring-red-100 shadow-md' : 'border-gray-100 hover:shadow-md'}`}>
                                    <div className="flex items-center justify-between gap-4 text-gray-900">
                                        <div className="flex-1 min-w-0 text-left text-gray-900">
                                            <div className="flex items-center gap-2 mb-1 text-left">{brief.isRead === false && <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}<p className="text-[9px] text-purple-600 font-black uppercase tracking-widest text-left">{brief['Дата']}</p></div>
                                            <h4 className="text-base font-black text-gray-900 uppercase truncate leading-none text-left">{brief['Имя']}</h4><p className="text-xs font-bold text-gray-500 truncate mt-1 text-left">{brief['Город']} • {brief['Контакты']}</p>
                                        </div>
                                        <button onClick={async (e) => { e.stopPropagation(); if(window.confirm('Удалить ТЗ?')) { const {db, fsMod} = fb; await fsMod.deleteDoc(fsMod.doc(db, 'artifacts', appId, 'public', 'data', 'briefs', brief.id)); } }} className="p-2 text-gray-300 hover:text-red-500 transition-colors text-gray-400"><Icon name="trash" size={18} /></button>
                                    </div>
                                </div>

                    {previewBrief && (
                        <div className="fixed inset-0 z-[150] bg-gray-900/60 backdrop-blur-xl flex items-center justify-center p-4 lg:p-10 modal-fade-in cursor-zoom-out" onClick={() => setPreviewBrief(null)}>
                            <div className="bg-white max-w-5xl w-full max-h-full overflow-y-auto rounded-[2.5rem] shadow-2xl p-6 lg:p-12 cursor-default relative scrollbar-hide text-gray-900 text-left" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setPreviewBrief(null)} className="absolute top-6 right-6 p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors z-[160] flex items-center justify-center text-gray-900"><Icon name="x" size={18}/></button>
                                <div className="mb-10 text-center"><p className="text-[10px] text-purple-600 font-black uppercase tracking-[0.5em] mb-3 text-center">{previewBrief['Дата']}</p><h2 className="text-3xl lg:text-5xl font-black text-gray-900 uppercase tracking-tighter leading-none mb-4 text-center">Техническое задание</h2><div className="h-1 w-20 bg-purple-600 mx-auto rounded-full"></div></div>
                                <div className="grid md:grid-cols-2 gap-8 mb-10 text-gray-900">
                                    <div className="space-y-6 text-gray-900 text-left">
                                        <div className="space-y-1 text-gray-900 text-left"><span className="text-[9px] text-gray-400 font-black uppercase tracking-widest block text-left">Заказчик</span><p className="text-xl font-black uppercase leading-none text-left">{previewBrief['Имя']}</p></div>
                                        <div className="space-y-1 text-gray-900 text-left"><span className="text-[9px] text-gray-400 font-black uppercase tracking-widest block text-left">Связь</span><p className="text-sm font-bold text-gray-600 uppercase text-left">{previewBrief['Город']} • {previewBrief['Контакты']}</p></div>
                                        <div className="bg-gray-50 p-5 rounded-2xl border border-gray-100 text-gray-900 text-left"><span className="text-[9px] text-purple-400 font-black uppercase tracking-widest block mb-2 text-left">Концепция</span><p className="text-gray-700 font-medium text-sm leading-relaxed whitespace-pre-wrap text-left">{previewBrief['Концепция']}</p></div>

                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const BriefPage = ({ fb, appId, categories, selectedItems, setSelectedItems, formData, setFormData, dishCounts, setDishCounts, onReset, onAddMore }) => {
            const [submitted, setSubmitted] = useState(false); const [sending, setSending] = useState(false); const [warn, setWarn] = useState(false);
            const [uploading, setUploading] = useState("");

            const safeSelected = Array.isArray(selectedItems) ? selectedItems : [];

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files); if (!files.length) return;
                setUploading("Сжимаем...");
                const newItems = await Promise.all(files.map(async (file, idx) => { 
                    const reader = new FileReader();
                    const b64 = await new Promise(res => {
                        reader.onload = ev => {
                            const img = new Image();
                            img.onload = () => {
                                const canv = document.createElement('canvas'); const max = 800; let w=img.width, h=img.height;
                                if(w>h && w>max){ h*=max/w; w=max; } else if(h>max){ w*=max/h; h=max; }
                                canv.width=w; canv.height=h; const ctx = canv.getContext('2d'); ctx.drawImage(img,0,0,w,h);
                                res(canv.toDataURL('image/jpeg', 0.7));

                        };

                    return { id: `local-${Date.now()}-${idx}-${Math.random().toString(36).substr(2,4)}`, category: 'Свой файл', title: file.name, image: b64, isLocal: true };

                const imageData = list.map(i => ({ title: i.title, image: i.image }));
                const finalData = { "Дата": new Date().toLocaleString('ru-RU'), "Имя": formData.fullName, "Город": formData.city, "Контакты": formData.contacts, "Концепция": formData.concept, "Сроки (от)": formData.dateFromObj.toLocaleDateString('ru-RU'), "Сроки (до)": formData.dateToObj.toLocaleDateString('ru-RU'), "Комментарий": formData.comment || '-', "Выбранные блюда": `Нужно: ${itemsStr || 'не указано'} | Референсы: ${refsStr || 'нет'}`, "selectedImageData": imageData, "isRead": false };
                try {

                    await fsMod.addDoc(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'briefs'), { createdAt: Date.now(), ...finalData });
                    setSubmitted(true);
                } catch (e) { console.error(e); } finally { setSending(false); }
            };

            return (
                <div className="max-w-4xl mx-auto px-6 py-8 space-y-12 pb-24 text-gray-900 text-left"><div className="text-center"><h2 className="text-4xl lg:text-6xl font-black uppercase mb-3 tracking-tighter text-glow leading-none text-center">БРИФИНГ</h2><p className="text-gray-400 font-bold uppercase text-[10px] tracking-[0.4em] mt-2 text-center text-center text-center">Сборка технического задания</p></div><form onSubmit={e => { e.preventDefault(); !formData.concept ? setWarn(true) : send(); }} className="space-y-8"><div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6 text-gray-900 text-left"><h3 className="text-[10px] font-black text-purple-600 uppercase text-left">01. Контакты</h3><div className="grid md:grid-cols-2 gap-5 text-left"><input required placeholder="ФИО / Компания *" className={inputClass} value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} /><input required placeholder="Город *" className={inputClass} value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} /></div><input required placeholder="Telegram / WhatsApp / Телефон (для связи) *" className={inputClass} value={formData.contacts} onChange={e => setFormData({...formData, contacts: e.target.value})} /></div><div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6 text-left"><div className="flex flex-col sm:flex-row sm:items-end justify-between gap-4 text-left"><div className="text-left"><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest text-left">02. Период работ</h3><p className="text-[10px] font-bold text-gray-400 uppercase mt-1 text-left">Ориентировочные даты приезда</p></div>{formData.dateFromObj && <div className="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg animate-in fade-in zoom-in text-left flex items-center gap-2"><Icon name="calendar" size={14}/> {formData.dateFromObj.toLocaleDateString('ru-RU')} {formData.dateToObj ? ` — ${formData.dateToObj.toLocaleDateString('ru-RU')}` : '(выберите конец)'}</div>}</div><DateRangePicker startDate={formData.dateFromObj} endDate={formData.dateToObj} onChange={(start, end) => setFormData({...formData, dateFromObj: start, dateToObj: end})} /></div><div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6 text-left"><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest text-left">03. Концепт</h3><textarea required placeholder="Опишите ваши идеи *" className={`${inputClass} h-32 resize-none font-medium text-left`} value={formData.concept} onChange={e => setFormData({...formData, concept: e.target.value})} /></div><div className="space-y-4 text-left text-gray-900"><h3 className="text-[10px] font-black text-purple-600 uppercase ml-2 tracking-widest text-left">04. Объемы</h3><div className="grid grid-cols-2 lg:grid-cols-3 gap-3 text-gray-900">{['Роллы', 'Горячие блюда', 'Холодные блюда', 'Супы/Рамёны', 'Закуски', 'Десерты'].map(c => <div key={c} className="glass-card p-4 rounded-xl border flex flex-col gap-3 group hover:border-purple-300 transition-colors shadow-sm text-gray-900 text-left"><span className="text-[9px] font-black uppercase text-gray-400 truncate tracking-widest text-left">{c}</span><div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-lg border border-gray-100 text-gray-900"><button type="button" onClick={() => setDishCounts({...dishCounts, [c]: Math.max(0, (dishCounts[c]||0)-1)})} className="w-7 h-7 bg-white rounded flex items-center justify-center shadow-sm text-gray-500 hover:text-gray-900 transition-colors"><Icon name="minus" size={12} /></button><span className="font-black text-gray-900">{dishCounts[c]||0}</span><button type="button" onClick={() => setDishCounts({...dishCounts, [c]: (dishCounts[c]||0)+1})} className="w-7 h-7 bg-purple-600 text-white rounded flex items-center justify-center shadow-sm hover:bg-purple-700 transition-colors"><Icon name="plus" size={12} /></button></div></div>)}</div></div><div className="glass-card p-6 lg:p-10 rounded-[2rem] space-y-6 text-left"><div className="flex justify-between items-center gap-4 text-left text-left text-left"><h3 className="text-[10px] font-black uppercase text-purple-600 tracking-widest text-left text-left text-left">05. Референсы ({safeSelected.length})</h3><div className="flex gap-2 text-left"><label className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase cursor-pointer flex items-center gap-2 hover:bg-purple-50 transition-colors shadow-sm text-gray-900"><Icon name="upload" size={12} className="text-purple-600"/> {uploading || "С устройства"} <input type="file" multiple accept="image/*" className="hidden" onChange={handleFileUpload} /></label><button type="button" onClick={onAddMore} className="btn-secondary px-4 py-2 rounded-lg text-[9px] font-black uppercase flex items-center gap-2 hover:bg-purple-50 transition-colors shadow-sm text-gray-900"><Icon name="layout-grid" size={12} className="text-purple-600"/> Из базы</button></div></div><div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-left">{(safeSelected).map(item => <div key={item.id} className="bg-white/80 border rounded-xl p-2.5 flex items-center gap-3 shadow-sm hover:shadow-md transition-all text-gray-900 text-left"><img src={item.image} className="w-10 h-10 rounded-lg object-cover bg-gray-50" /><p className="flex-1 text-xs font-black truncate uppercase text-gray-900 leading-none text-left">{item.title || 'Блюдо'}</p><button type="button" onClick={() => setSelectedItems(prev => prev.filter(x => x.id !== item.id))} className="text-gray-400 hover:text-red-500 transition-colors"><Icon name="x" size={14} /></button></div>)}{safeSelected.length === 0 && <p className="text-[10px] font-black text-gray-300 uppercase text-center py-8 border-2 border-dashed border-gray-100 rounded-xl w-full col-span-full tracking-widest text-center text-center text-center">Пусто</p>}</div></div><button type="submit" disabled={sending || !!uploading} className="w-full btn-primary py-5 rounded-[1.5rem] font-black text-lg uppercase disabled:opacity-50 transition-all mt-2 shadow-xl tracking-[0.2em] active:scale-95 text-white">{sending ? 'Отправка...' : 'Отправить ТЗ в работу'}</button></form></div>
            );
        };

        // --- 3. ГЛАВНЫЙ КОМПОНЕНТ APP ---

        function App() {
            const [activeTab, setActiveTab] = useState('welcome');
            const [selectedItems, setSelectedItems] = useState([]);
            const [portfolioItems, setPortfolioItems] = useState([]);
            const [categories, setCategories] = useState([]);
            const [briefs, setBriefs] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [dbError, setDbError] = useState(null); 
            const [formData, setFormData] = useState({ fullName: '', city: '', contacts: '', concept: '', dateFromObj: null, dateToObj: null, comment: '' });
            const [dishCounts, setDishCounts] = useState({});
            const [isAdmin, setIsAdmin] = useState(localStorage.getItem('is_tastelab_admin') === 'true');
            const [showAdminAuth, setShowAdminAuth] = useState(false);
            const [adminPwd, setAdminPwd] = useState('');
            const [adminPwdError, setAdminPwdError] = useState(false);
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

            useEffect(() => {
                const loadFirebase = async () => {
                    try {
                        const importModule = new Function('url', 'return import(url)');
                        const [appMod, authMod, fsMod] = await Promise.all([
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'),
                            importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js')
                        ]);
                        const firebaseConfig = { apiKey: "AIzaSyCbsJUDJ4AMJBi_UOnX23n-T-vGq4O4mGs", authDomain: "menubuild-c3fc6.firebaseapp.com", projectId: "menubuild-c3fc6", storageBucket: "menubuild-c3fc6.firebasestorage.app", messagingSenderId: "1013946778157", appId: "1:1013946778157:web:cd1225bfeb3426720aeea4" };
                        const app = appMod.initializeApp(firebaseConfig);
                        const auth = authMod.getAuth(app);
                        const db = fsMod.getFirestore(app);
                        setFb({ auth, db, authMod, fsMod });
                    } catch (e) { setDbError("База данных недоступна"); setIsLoadingData(false); }
                };
                loadFirebase();
            }, []);

            useEffect(() => {
                if (!fb) return;
                const { auth, authMod } = fb;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await authMod.signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await authMod.signInAnonymously(auth); }
                        } else { await authMod.signInAnonymously(auth); }
                    } catch (e) { setDbError("Ошибка авторизации"); setIsLoadingData(false); }
                };
                initAuth();
                const unsub = authMod.onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, [fb]);

            useEffect(() => {
                if (!fb || !user) return;
                const { db, fsMod } = fb;
                const unsubPort = fsMod.onSnapshot(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'portfolio'), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setPortfolioItems(items);
                    const allCats = new Set();
                    items.forEach(item => { if (item && item.category) item.category.split(',').forEach(c => allCats.add(c.trim())); });
                    setCategories([...allCats]);
                    setIsLoadingData(false);
                });
                const unsubBriefs = fsMod.onSnapshot(fsMod.collection(db, 'artifacts', appId, 'public', 'data', 'briefs'), (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setBriefs(items);
                });
                return () => { unsubPort(); unsubBriefs(); };
            }, [fb, user, appId]);

            const navigateTo = (tab) => { setActiveTab(tab); window.scrollTo(0, 0); };
            
            const handleLogin = () => { 
                if (adminPwd === 'Kursant2026') { 
                    setIsAdmin(true); 
                    localStorage.setItem('is_tastelab_admin', 'true'); 
                    setShowAdminAuth(false); 
                    setAdminPwd(''); 
                    navigateTo('admin'); 
                } else { 
                    setAdminPwdError(true); 
                } 
            };

            const unreadCount = (briefs || []).filter(b => b && b.isRead === false).length;

            if (isLoadingData) return <div className="min-h-screen flex flex-col items-center justify-center text-gray-900"><div className="w-16 h-16 border-4 border-gray-200 border-t-purple-600 rounded-full animate-spin mb-6"></div><h2 className="text-xl font-black uppercase tracking-[0.5em] text-gray-400 animate-pulse">Tastelab</h2></div>;

            return (
                <div className="min-h-screen relative text-gray-900">
                    <nav className="fixed w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 shadow-sm transition-all duration-500 text-gray-900">
                        <div className="max-w-7xl mx-auto px-6 h-20 lg:h-24 flex justify-between items-center text-gray-900">
                            <div className="text-2xl lg:text-3xl font-black tracking-tighter cursor-pointer text-gray-900" onClick={() => navigateTo('welcome')}>TASTE<span className="font-light text-gray-400">LAB</span></div>
                            <div className="hidden md:flex space-x-10 items-center">
                                <button onClick={() => navigateTo('welcome')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'welcome' ? 'text-gray-900' : 'text-gray-400 hover:text-gray-900'}`}>О нас</button>
                                <button onClick={() => navigateTo('portfolio')} className={`text-sm font-bold uppercase tracking-widest ${activeTab === 'portfolio' ? 'text-gray-900' : 'text-gray-400 hover:text-gray-900'}`}>Портфолио</button>
                                <button onClick={() => navigateTo('brief')} className="btn-primary px-8 py-3 rounded-full text-sm font-black uppercase tracking-widest flex items-center gap-3 shadow-lg text-white">Составить ТЗ {selectedItems?.length > 0 && <span className="bg-white text-gray-900 px-2.5 py-0.5 rounded-full text-[10px]">{selectedItems.length}</span>}</button>
                            </div>
                            <button className="md:hidden text-gray-600 p-2" onClick={() => navigateTo(activeTab === 'portfolio' ? 'brief' : 'portfolio')}><Icon name={activeTab === 'portfolio' ? "send" : "layout-grid"} size={28} /></button>
                        </div>
                    </nav>

                    <main className="pt-24 lg:pt-32">
                        {activeTab === 'welcome' && <WelcomePage onNext={() => navigateTo('portfolio')} />}
                        {activeTab === 'portfolio' && <PortfolioPage items={portfolioItems} categories={categories} onNext={() => navigateTo('brief')} selectedItems={selectedItems} setSelectedItems={setSelectedItems} />}
                        {activeTab === 'admin' && <AdminPage fb={fb} appId={appId} portfolioItems={portfolioItems} briefs={briefs} onLogout={() => { setIsAdmin(false); localStorage.removeItem('is_tastelab_admin'); navigateTo('welcome'); }} onGoToBrief={() => navigateTo('brief')} />}
                        {activeTab === 'brief' && <BriefPage fb={fb} appId={appId} categories={categories} selectedItems={selectedItems} setSelectedItems={setSelectedItems} formData={formData} setFormData={setFormData} dishCounts={dishCounts} setDishCounts={setDishCounts} onReset={() => {setSelectedItems([]); navigateTo('welcome');}} onAddMore={() => navigateTo('portfolio')} />}
                    </main>

                    <button onClick={() => { if (isAdmin) navigateTo('admin'); else setShowAdminAuth(true); }} className={`fixed bottom-6 right-6 z-[100] p-3 rounded-full transition-all shadow-2xl ${isAdmin ? 'bg-purple-600 text-white scale-110 opacity-100' : 'opacity-10 hover:opacity-100 hover:bg-white text-gray-500'}`}>
                        <div className="relative"><Icon name={isAdmin ? "settings" : "home"} size={24} />{unreadCount > 0 && <span className="absolute -top-2 -right-2 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-white pulse-red"></span>}</div>
                    </button>

                    {showAdminAuth && (
                        <div className="fixed inset-0 z-[200] bg-gray-900/60 backdrop-blur-md flex items-center justify-center p-4 modal-fade-in text-gray-900" onClick={() => setShowAdminAuth(false)}>
                            <div className="glass-card p-8 rounded-[2rem] w-full max-w-sm text-center relative shadow-2xl border border-white/50 text-gray-900" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowAdminAuth(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors flex items-center justify-center text-gray-900"><Icon name="x" size={20} /></button>
                                <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-600 shadow-inner"><Icon name="lock" size={24} /></div>
                                <h3 className="font-black text-xl uppercase mb-6 text-gray-900">Админ-доступ</h3>
                                <input type="password" autoFocus placeholder="ПАРОЛЬ" className="w-full bg-white/80 border border-gray-200 p-4 rounded-xl text-center font-black tracking-[0.5em] outline-none mb-4 text-gray-900" value={adminPwd} onChange={e => {setAdminPwd(e.target.value); setAdminPwdError(false);}} onKeyDown={e => { if(e.key === 'Enter') handleLogin(); }} />
                                <button onClick={handleLogin} className="w-full btn-primary py-4 rounded-xl font-black text-sm uppercase transition-transform active:scale-95 shadow-lg text-white">Войти</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
